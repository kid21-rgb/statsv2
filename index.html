          <button onClick={() => setLogFilterPeriod('all')} className={`px-3 py-1 rounded text-sm ${logFilterPeriod === 'all' ? 'bg-orange-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>All</button>
          {periods.map(period => (
            <button key={period} onClick={() => scrollToPeriod(period)} className={`px-3 py-1 rounded text-sm ${logFilterPeriod === String(period) ? 'bg-orange-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>Q{period}</button>
          ))}
        </div>

        <div className="space-y-2 max-h-[60vh] overflow-y-auto">
          {filteredLog.length === 0 ? <p className={theme.textMuted}>No stats recorded yet</p> : filteredLog.map((entry, idx) => {
            const actualIndex = log.indexOf(entry);
            const isOpponent = entry.playerIndex === 'opponent';
            const isFocused = focusedStatIndex === actualIndex;

            // Different backgrounds for team vs opponent
            let bgClass = darkMode ? 'bg-gray-700' : 'bg-gray-50';
            if (isOpponent) {
              bgClass = darkMode ? 'bg-yellow-900/40' : 'bg-yellow-50';
            } else if (entry.playerIndex !== null && entry.statType !== 'endPeriod') {
              bgClass = darkMode ? 'bg-blue-900/30' : 'bg-blue-50';
            }

            return (
              <div
                key={idx}
                ref={isFocused ? focusedRef : null}
                className={`p-2 ${bgClass} rounded border-l-4 ${entry.statType === 'endPeriod' ? 'border-purple-600' : entry.auto ? 'border-yellow-500' : isOpponent ? 'border-yellow-600' : 'border-blue-600'} ${isFocused ? 'ring-2 ring-orange-500' : ''}`}
              >
                <div className="flex justify-between items-start">
                  <div className="flex-1">
                    <span className={`text-xs ${theme.textMuted}`}>Q{entry.period}</span>
                    <p className="text-sm">{entry.text}</p>
                  </div>
                  <div className="flex gap-1 ml-2">
                    <button onClick={() => handleStatAction(actualIndex, 'insert_above')} className={`p-1 rounded text-xs ${darkMode ? 'bg-gray-600 hover:bg-gray-500' : 'bg-gray-200 hover:bg-gray-300'}`} title="Insert above">
                      <ChevronUp size={14} />
                    </button>
                    <button onClick={() => handleStatAction(actualIndex, 'insert_below')} className={`p-1 rounded text-xs ${darkMode ? 'bg-gray-600 hover:bg-gray-500' : 'bg-gray-200 hover:bg-gray-300'}`} title="Insert below">
                      <ChevronDown size={14} />
                    </button>
                    <button onClick={() => handleStatAction(actualIndex, 'delete')} className="p-1 rounded text-xs bg-red-500 hover:bg-red-600 text-white" title="Delete">
                      <Trash2 size={14} />
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Stat selection modal */}
      {showStatModal && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div className={`${theme.card} ${theme.text} rounded-lg p-4 max-w-md w-full max-h-[80vh] overflow-y-auto`}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold">{modalMode === 'insert_above' ? 'Insert Stat Above' : 'Insert Stat Below'}</h3>
              <button onClick={() => { setShowStatModal(false); setModalMode(null); }} className="p-1"><X size={24} /></button>
            </div>

            {/* Period selector */}
            <div className="mb-4">
              <label className="block text-sm font-medium mb-2">Period:</label>
              <div className="flex gap-2 flex-wrap">
                {[1,2,3,4,5,6,7,8].map(p => (
                  <button key={p} onClick={() => setSelectedPeriod(p)} className={`px-3 py-1 rounded text-sm ${selectedPeriod === p ? 'bg-orange-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>Q{p}</button>
                ))}
              </div>
            </div>

            {/* Player/Opponent selector */}
            {selectedPlayer === null ? (
              <div className="space-y-2">
                <p className="text-sm font-medium mb-2">Select Player:</p>
                <button onClick={() => setSelectedPlayer('opponent')} className={`w-full p-3 rounded text-left ${darkMode ? 'bg-yellow-900/40 hover:bg-yellow-900/60' : 'bg-yellow-100 hover:bg-yellow-200'} border-2 border-yellow-600`}>
                  Opponent
                </button>
                {currentGame?.players.map((player, idx) => (
                  <button key={idx} onClick={() => setSelectedPlayer(idx)} className={`w-full p-3 rounded text-left ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'}`}>
                    #{player.number} {player.name}
                  </button>
                ))}
                <button onClick={() => { onInsertEndPeriod(selectedStatIndex, modalMode === 'insert_above' ? 'above' : 'below', selectedPeriod); setShowStatModal(false); }} className="w-full p-3 rounded text-left bg-purple-600 text-white hover:bg-purple-700 font-medium">
                  End Period {selectedPeriod}
                </button>
              </div>
            ) : (
              <div className="space-y-2">
                <button onClick={() => setSelectedPlayer(null)} className="text-blue-500 text-sm mb-2">← Back to player selection</button>
                <p className="text-sm font-medium mb-2">Select Stat for {selectedPlayer === 'opponent' ? 'Opponent' : `#${currentGame.players[selectedPlayer].number} ${currentGame.players[selectedPlayer].name}`}:</p>
                <div className="grid grid-cols-2 gap-2">
                  {statTypes.map(stat => (
                    <button key={stat.key} onClick={() => handleStatSelect(stat.key)} className={`${stat.color} text-white p-2 rounded text-sm font-medium hover:opacity-90`}>
                      {stat.label}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

const ViewGames = ({ games, onViewGame, onBack, onDeleteGame, darkMode, theme }) => {
  const [confirmDelete, setConfirmDelete] = useState(null);
  const handleDelete = (gameId) => { onDeleteGame(gameId); setConfirmDelete(null); };
  const sortedGames = [...games].sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : b.id - a.id));
  return (
    <div className={`min-h-screen ${theme.bg} ${theme.text} p-4 max-w-2xl mx-auto`}>
      <button onClick={onBack} className="mb-4 flex items-center gap-2 text-blue-500 hover:text-blue-400"><ArrowLeft size={20} /> Back</button>
      <div className={`${theme.card} rounded-lg shadow-lg p-4 sm:p-6`}>
        <h2 className="text-2xl font-bold mb-4">Previous Games</h2>
        {games.length === 0 ? <p className={theme.textMuted}>No games recorded yet</p> : (
          <div className="space-y-2">
            {sortedGames.map((game) => {
              const oppName = game.opponentName || 'Unknown';
              return (
                <div key={game.id} className="flex gap-2">
                  <button onClick={() => onViewGame(game)} className={`flex-1 p-4 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-50 hover:bg-gray-100'} rounded-lg text-left border ${theme.border}`}>
                    <div className="font-bold">{game.teamName} vs {oppName}</div>
                    <div className={`text-sm ${theme.textMuted}`}>{game.date} • {game.location}</div>
                  </button>
                  {confirmDelete === game.id ? (
                    <div className="flex gap-1">
                      <button onClick={() => handleDelete(game.id)} className="bg-red-600 text-white px-3 rounded hover:bg-red-700">Confirm</button>
                      <button onClick={() => setConfirmDelete(null)} className="bg-gray-500 text-white px-3 rounded hover:bg-gray-600">Cancel</button>
                    </div>
                  ) : (<button onClick={() => setConfirmDelete(game.id)} className="bg-red-500 text-white px-3 rounded hover:bg-red-600"><Trash2 size={18} /></button>)}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

const SummaryView = ({ game, log, rotations, onBack, onStatEntry, onBoxScore, onRotations, onGameLog, onMainMenu, darkMode, theme, isEndGameView, autoDownload, onAutoDownloadDone, onShotChart }) => {
  const [showMMConfirm, setShowMMConfirm] = React.useState(false);
  const [filterPeriod, setFilterPeriod] = React.useState('Total');
  const summaryRef = React.useRef(null);

  const exportJPG = async () => {
    if (!summaryRef.current) return;
    try {
      const canvas = await html2canvas(summaryRef.current, { backgroundColor: darkMode ? '#1f2937' : '#ffffff', scale: 2 });
      const link = document.createElement('a');
      link.download = `${game.date} - ${game.teamName} vs ${game.opponentName || 'Opponent'} - Summary.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } catch (e) { console.error('JPG export failed', e); }
  };

  React.useEffect(() => {
    if (autoDownload) {
      const timer = setTimeout(() => {
        exportJPG().then(() => { if (onAutoDownloadDone) onAutoDownloadDone(); });
      }, 200);
      return () => clearTimeout(timer);
    }
  }, [autoDownload]);

  const periods = [];
  for (let i = 1; i <= (game.maxPeriod || 1); i++) periods.push(i);

  const getFilteredStats = (entity) =>
    filterPeriod === 'Total' ? entity.stats || {} : entity.periodStats?.[parseInt(filterPeriod)] || {};

  const getTeamTotals = () => {
    const totals = {};
    game.players.forEach(player => {
      const stats = getFilteredStats(player);
      Object.keys(stats).forEach(key => { totals[key] = (totals[key] || 0) + (stats[key] || 0); });
    });
    return totals;
  };

  const teamTotals = getTeamTotals();
  const oppStats = getFilteredStats(game.opponent);

  const teamPts = (teamTotals['2ptMade'] || 0) * 2 + (teamTotals['3ptMade'] || 0) * 3 + (teamTotals['FTMade'] || 0);
  const oppPts = (oppStats['2ptMade'] || 0) * 2 + (oppStats['3ptMade'] || 0) * 3 + (oppStats['FTMade'] || 0);

  const teamFGMade = (teamTotals['2ptMade'] || 0) + (teamTotals['3ptMade'] || 0);
  const teamFGAtt = teamFGMade + (teamTotals['2ptMiss'] || 0) + (teamTotals['3ptMiss'] || 0);
  const oppFGMade = (oppStats['2ptMade'] || 0) + (oppStats['3ptMade'] || 0);
  const oppFGAtt = oppFGMade + (oppStats['2ptMiss'] || 0) + (oppStats['3ptMiss'] || 0);

  const team3Made = teamTotals['3ptMade'] || 0;
  const team3Att = team3Made + (teamTotals['3ptMiss'] || 0);
  const opp3Made = oppStats['3ptMade'] || 0;
  const opp3Att = opp3Made + (oppStats['3ptMiss'] || 0);

  const teamFTMade = teamTotals['FTMade'] || 0;
  const teamFTAtt = teamFTMade + (teamTotals['FTMiss'] || 0);
  const oppFTMade = oppStats['FTMade'] || 0;
  const oppFTAtt = oppFTMade + (oppStats['FTMiss'] || 0);

  // Shooting percentages (0–100 scale for bar comparison)
  const teamFGPct = teamFGAtt > 0 ? Math.round(teamFGMade / teamFGAtt * 100) : 0;
  const oppFGPct = oppFGAtt > 0 ? Math.round(oppFGMade / oppFGAtt * 100) : 0;
  const team3Pct = team3Att > 0 ? Math.round(team3Made / team3Att * 100) : 0;
  const opp3Pct = opp3Att > 0 ? Math.round(opp3Made / opp3Att * 100) : 0;
  const teamFTPct = teamFTAtt > 0 ? Math.round(teamFTMade / teamFTAtt * 100) : 0;
  const oppFTPct = oppFTAtt > 0 ? Math.round(oppFTMade / oppFTAtt * 100) : 0;

  // Category points for our team
  const getCatPts = (category) => {
    let pts = 0;
    const ftKey = category === 'Transition' ? 'FTMade_T' : category === 'HalfCourt' ? 'FTMade_H' : 'FTMade_2C';
    game.players.forEach(player => {
      (player.shotChart || []).forEach(shot => {
        if (shot.made && shot.category === category) {
          if (filterPeriod === 'Total' || shot.period === parseInt(filterPeriod)) {
            pts += shot.is3pt ? 3 : 2;
          }
        }
      });
      const pStats = getFilteredStats(player);
      pts += pStats[ftKey] || 0;
    });
    return pts;
  };

  const teamTransPts = getCatPts('Transition');
  const teamHalfPts = getCatPts('HalfCourt');
  const team2ndPts = getCatPts('2ndChance');
  const oppTransPts = oppStats['transPts'] || 0;
  const oppHalfPts = oppStats['halfCourtPts'] || 0;
  const opp2ndPts = oppStats['secChancePts'] || 0;

  // Largest lead from game log
  const getLargestLeads = () => {
    if (!log || log.length === 0) return { us: 0, them: 0 };
    const events = [...log].reverse();
    let ts = 0, os = 0, bigUs = 0, bigThem = 0;
    events.forEach(entry => {
      if (filterPeriod !== 'Total' && entry.period !== parseInt(filterPeriod)) return;
      if (entry.playerIndex === 'opponent') {
        if (entry.statType === '2ptMade') os += 2;
        else if (entry.statType === '3ptMade') os += 3;
        else if (entry.statType === 'FTMade') os += 1;
      } else if (entry.playerIndex !== null && entry.statType !== 'endPeriod') {
        if (entry.statType === '2ptMade') ts += 2;
        else if (entry.statType === '3ptMade') ts += 3;
        else if (entry.statType === 'FTMade') ts += 1;
      }
      const m = ts - os;
      if (m > bigUs) bigUs = m;
      if (-m > bigThem) bigThem = -m;
    });
    return { us: bigUs, them: bigThem };
  };
  const { us: biggestUsLead, them: biggestThemLead } = getLargestLeads();

  // Off/Def ratings
  const computeRatings = () => {
    const t = teamTotals;
    const o = oppStats;
    const ourFGA = (t['2ptMade'] || 0) + (t['2ptMiss'] || 0) + (t['3ptMade'] || 0) + (t['3ptMiss'] || 0);
    const ourTO = (t['LiveTO'] || 0) + (t['DeadTO'] || 0);
    const ourFTA = (t['FTMade'] || 0) + (t['FTMiss'] || 0);
    const ourOReb = t['OffReb'] || 0;
    const ourPoss = ourFGA + ourTO + 0.44 * ourFTA - ourOReb;
    const oppFGAx = (o['2ptMade'] || 0) + (o['2ptMiss'] || 0) + (o['3ptMade'] || 0) + (o['3ptMiss'] || 0);
    const oppTO = (o['LiveTO'] || 0) + (o['DeadTO'] || 0);
    const oppFTAx = (o['FTMade'] || 0) + (o['FTMiss'] || 0);
    const oppOReb = o['OffReb'] || 0;
    const oppPoss = oppFGAx + oppTO + 0.44 * oppFTAx - oppOReb;
    const oRate = ourPoss > 0 ? parseFloat((teamPts / ourPoss * 100).toFixed(1)) : null;
    const dRate = oppPoss > 0 ? parseFloat((oppPts / oppPoss * 100).toFixed(1)) : null;
    const oppORate = oppPoss > 0 ? parseFloat((oppPts / oppPoss * 100).toFixed(1)) : null;
    const oppDRate = ourPoss > 0 ? parseFloat((teamPts / ourPoss * 100).toFixed(1)) : null;
    return { ourORate: oRate, ourDRate: dRate, oppORate, oppDRate, ourPoss: Math.round(ourPoss), oppPoss: Math.round(oppPoss) };
  };
  const { ourORate, ourDRate, oppORate, oppDRate, ourPoss, oppPoss } = computeRatings();

  const computePace = () => {
    const minsPerPeriod = game.minutesPerPeriod || 10;
    const nPeriods = game.numPeriods || game.maxPeriod || 4;
    const minsPerGame = nPeriods * minsPerPeriod;
    const actualMins = filterPeriod === 'Total' ? minsPerGame : minsPerPeriod;
    const totalPoss = ourPoss + oppPoss;
    if (totalPoss === 0 || actualMins === 0) return null;
    // Pace = total possessions (both teams) extrapolated to full game length
    // Comparable to NBA pace (both teams' possessions per 48 min): use game's own regulation time
    return Math.round((totalPoss / actualMins) * minsPerGame);
  };
  const pace = computePace();

  const US_COLOR = '#f97316';
  const OPP_COLOR = '#3b82f6';
  const opponentName = game.opponentName || 'Opponent';

  // Per-stat contextual max — junior basketball scale, separate for Total vs per-period
  const isPeriod = filterPeriod !== 'Total';
  const REF_MAX = isPeriod ? {
    pts: 18, fg: 65, threept: 50, ft: 90,
    dreb: 8, oreb: 4, ast: 5, stl: 4, blk: 2,
    liveto: 5, deaDto: 4, fouls: 6,
    catPts: 14, lead: 14, rating: 120,
  } : {
    pts: 55, fg: 65, threept: 50, ft: 90,
    dreb: 20, oreb: 10, ast: 12, stl: 8, blk: 4,
    liveto: 12, deaDto: 8, fouls: 15,
    catPts: 35, lead: 20, rating: 120,
  };

  // Bar width as % of container: capped at 85%, scaled against refMax
  const barPct = (val, refMax) => Math.min(85, (val / refMax) * 85);

  // Category % of total points label
  const catLabel = (pts, total) => {
    if (pts === 0) return '0';
    const pct = total > 0 ? Math.round(pts / total * 100) : 0;
    return `${pts}pts (${pct}%)`;
  };

  // StatRow: values always shown inside bar with white text; bar clips if too narrow
  const StatRow = ({ label, usVal, themVal, refMax, usLabel, themLabel, isPercent, usMade, usAtt, themMade, themAtt }) => {
    const usNum = usVal != null ? usVal : 0;
    const themNum = themVal != null ? themVal : 0;
    const usPct = barPct(usNum, refMax);
    const themPct = barPct(themNum, refMax);
    const usText = usLabel || (isPercent ? `${usMade}/${usAtt} ${usNum}%` : String(usNum));
    const themText = themLabel || (isPercent ? `${themMade}/${themAtt} ${themNum}%` : String(themNum));

    // Show text if value > 0, OR if it's a percent stat with attempts (e.g. 0/10 0%)
    const showUs = usNum > 0 || (isPercent && usAtt > 0);
    const showThem = themNum > 0 || (isPercent && themAtt > 0);
    const textStyle = { textShadow: '0 0 3px rgba(0,0,0,0.85)', whiteSpace: 'nowrap' };
    return (
      <div className="flex items-center my-0.5 h-7">
        {/* Us bar — right-aligned, grows left from center */}
        <div className="flex-1 flex justify-end h-full items-center overflow-visible">
          <div className="h-6 rounded-l flex items-center justify-end pr-1"
               style={{width: `${usPct}%`, backgroundColor: usPct > 0 ? US_COLOR : 'transparent', minWidth: showUs ? '4px' : '0', overflow: 'visible'}}>
            {showUs && <span className="text-white text-xs font-bold" style={textStyle}>{usText}</span>}
          </div>
        </div>

        {/* Center label */}
        <div className={`w-24 text-center text-xs font-medium shrink-0 px-1 ${theme.textMuted}`}>{label}</div>

        {/* Them bar — left-aligned, grows right from center */}
        <div className="flex-1 flex justify-start h-full items-center overflow-visible">
          <div className="h-6 rounded-r flex items-center justify-start pl-1"
               style={{width: `${themPct}%`, backgroundColor: themPct > 0 ? OPP_COLOR : 'transparent', minWidth: showThem ? '4px' : '0', overflow: 'visible'}}>
            {showThem && <span className="text-white text-xs font-bold" style={textStyle}>{themText}</span>}
          </div>
        </div>
      </div>
    );
  };

  const Divider = () => <div className={`border-t ${theme.border} my-2`} />;

  return (
    <div className={`min-h-screen ${theme.bg} ${theme.text} p-4 max-w-2xl mx-auto`}>
      {/* Nav */}
      <div className="flex gap-1 mb-4 items-center min-w-0">
        <div className="flex gap-1 items-center overflow-x-auto no-scrollbar flex-1 min-w-0">
          <button onClick={onBack} className="flex-shrink-0 flex items-center gap-1 text-blue-500 hover:text-blue-400 text-xs sm:text-sm whitespace-nowrap"><ArrowLeft size={16} /> Back</button>
          <button onClick={exportJPG} className="flex-shrink-0 bg-blue-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-blue-700 flex items-center gap-1 text-xs sm:text-sm whitespace-nowrap"><Download size={14} /> JPG</button>
          {onBoxScore && <button onClick={onBoxScore} className="flex-shrink-0 bg-green-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-green-700 text-xs sm:text-sm whitespace-nowrap">Box Score</button>}
          {onRotations && <button onClick={onRotations} className="flex-shrink-0 bg-teal-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-teal-700 text-xs sm:text-sm whitespace-nowrap">Rotations</button>}
          {onShotChart && <button onClick={onShotChart} className="flex-shrink-0 bg-cyan-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-cyan-700 text-xs sm:text-sm whitespace-nowrap">Shot Chart</button>}
          {!isEndGameView && onStatEntry && <button onClick={onStatEntry} className="flex-shrink-0 bg-blue-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-blue-700 text-xs sm:text-sm whitespace-nowrap">Stat Entry</button>}
          {onGameLog && <button onClick={onGameLog} className="flex-shrink-0 bg-purple-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-purple-700 text-xs sm:text-sm whitespace-nowrap">Game Log</button>}
          {onMainMenu && (showMMConfirm ? (
            <div className="flex gap-1 items-center flex-shrink-0">
              <span className={`text-xs font-medium ${theme.text} whitespace-nowrap`}>Main menu?</span>
              <button onClick={() => { setShowMMConfirm(false); onMainMenu(); }} className="bg-gray-700 text-white px-2 py-1 rounded hover:bg-gray-800 text-xs font-bold">Yes</button>
              <button onClick={() => setShowMMConfirm(false)} className="bg-gray-500 text-white px-2 py-1 rounded hover:bg-gray-600 text-xs">No</button>
            </div>
          ) : (
            <button onClick={() => setShowMMConfirm(true)} className="flex-shrink-0 bg-gray-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-gray-700 text-xs sm:text-sm whitespace-nowrap">Main Menu</button>
          ))}
        </div>
      </div>

      <div ref={summaryRef} className={`${theme.card} rounded-lg shadow-lg p-4`}>
        <h2 className="text-xl font-bold mb-1">Game Summary</h2>
        <p className={`text-sm ${theme.textMuted} mb-4`}>{game.date} @ {game.location || 'N/A'}</p>

        {/* Score header */}
        <div className="flex items-center mb-4">
          <div className="flex-1 text-center">
            <div className="text-sm font-bold" style={{color: US_COLOR}}>{game.teamName}</div>
            <div className="text-3xl font-bold">{teamPts}</div>
          </div>
          <div className={`text-center px-3 text-sm font-medium ${theme.textMuted}`}>vs</div>
          <div className="flex-1 text-center">
            <div className="text-sm font-bold" style={{color: OPP_COLOR}}>{opponentName}</div>
            <div className="text-3xl font-bold">{oppPts}</div>
          </div>
        </div>

        {/* Period filter */}
        <div className="flex gap-2 mb-4 flex-wrap">
          {periods.map(p => (
            <button key={p} onClick={() => setFilterPeriod(String(p))} className={`px-3 py-1 rounded text-sm ${filterPeriod === String(p) ? 'bg-orange-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>Q{p}</button>
          ))}
          <button onClick={() => setFilterPeriod('Total')} className={`px-3 py-1 rounded text-sm ${filterPeriod === 'Total' ? 'bg-orange-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>Total</button>
        </div>

        {/* Legend — aligned to bar columns */}
        <div className="flex items-center mb-2">
          <div className="flex-1 text-center">
            <span className="text-xs font-bold" style={{color: US_COLOR}}>{game.teamName}</span>
          </div>
          <div className="w-24 text-center">
            <span className={`text-xs ${theme.textMuted}`}>Stat</span>
          </div>
          <div className="flex-1 text-center">
            <span className="text-xs font-bold" style={{color: OPP_COLOR}}>{opponentName}</span>
          </div>
        </div>

        {/* Stat rows */}
        <StatRow label="Points" usVal={teamPts} themVal={oppPts} refMax={REF_MAX.pts} />
        <StatRow label="FG%" usVal={teamFGPct} themVal={oppFGPct} refMax={REF_MAX.fg} isPercent usMade={teamFGMade} usAtt={teamFGAtt} themMade={oppFGMade} themAtt={oppFGAtt} />
        <StatRow label="3PT%" usVal={team3Pct} themVal={opp3Pct} refMax={REF_MAX.threept} isPercent usMade={team3Made} usAtt={team3Att} themMade={opp3Made} themAtt={opp3Att} />
        <StatRow label="FT%" usVal={teamFTPct} themVal={oppFTPct} refMax={REF_MAX.ft} isPercent usMade={teamFTMade} usAtt={teamFTAtt} themMade={oppFTMade} themAtt={oppFTAtt} />
        <StatRow label="Def Reb" usVal={teamTotals['DefReb'] || 0} themVal={oppStats['DefReb'] || 0} refMax={REF_MAX.dreb} />
        <StatRow label="Off Reb" usVal={teamTotals['OffReb'] || 0} themVal={oppStats['OffReb'] || 0} refMax={REF_MAX.oreb} />
        <StatRow label="Assists" usVal={teamTotals['Ast'] || 0} themVal={oppStats['Ast'] || 0} refMax={REF_MAX.ast} />
        <StatRow label="Steals" usVal={teamTotals['Stl'] || 0} themVal={oppStats['Stl'] || 0} refMax={REF_MAX.stl} />
        <StatRow label="Blocks" usVal={teamTotals['Blk'] || 0} themVal={oppStats['Blk'] || 0} refMax={REF_MAX.blk} />
        <StatRow label="Live TOs" usVal={teamTotals['LiveTO'] || 0} themVal={oppStats['LiveTO'] || 0} refMax={REF_MAX.liveto} />
        <StatRow label="Dead TOs" usVal={teamTotals['DeadTO'] || 0} themVal={oppStats['DeadTO'] || 0} refMax={REF_MAX.deaDto} />
        <StatRow label="Fouls" usVal={teamTotals['Foul'] || 0} themVal={oppStats['Foul'] || 0} refMax={REF_MAX.fouls} />
        <Divider />
        <StatRow label="Trans. Pts" usVal={teamTransPts} themVal={oppTransPts} refMax={REF_MAX.catPts}
          usLabel={catLabel(teamTransPts, teamPts)} themLabel={catLabel(oppTransPts, oppPts)} />
        <StatRow label="½ Court Pts" usVal={teamHalfPts} themVal={oppHalfPts} refMax={REF_MAX.catPts}
          usLabel={catLabel(teamHalfPts, teamPts)} themLabel={catLabel(oppHalfPts, oppPts)} />
        <StatRow label="2nd Chance" usVal={team2ndPts} themVal={opp2ndPts} refMax={REF_MAX.catPts}
          usLabel={catLabel(team2ndPts, teamPts)} themLabel={catLabel(opp2ndPts, oppPts)} />
        <StatRow label="Lrgst Lead" usVal={biggestUsLead} themVal={biggestThemLead} refMax={REF_MAX.lead} />
        {(ourORate !== null || oppORate !== null) && (
          <StatRow label="Off Rating" usVal={ourORate || 0} themVal={oppORate || 0} refMax={REF_MAX.rating} />
        )}
        {(ourDRate !== null || oppDRate !== null) && (
          <StatRow label="Def Rating" usVal={ourDRate || 0} themVal={oppDRate || 0} refMax={REF_MAX.rating} />
        )}
        <StatRow label="Possessions" usVal={ourPoss} themVal={oppPoss} refMax={isPeriod ? 22 : 70} />
        {pace !== null && (
          <div className="flex items-center my-0.5 h-7">
            <div className="flex-1" />
            <div className={`w-24 text-center shrink-0`}>
              <span className={`text-xs font-medium ${theme.textMuted}`}>PACE </span>
              <span className="text-sm font-bold">{pace}</span>
            </div>
            <div className="flex-1" />
          </div>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<BasketballStatsApp />);
</script>
</body>
</html>

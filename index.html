          {lastStat && <p className="text-xs sm:text-sm text-blue-500 mt-1 line-clamp-1">{lastStat.text}</p>}
        </div>

        <div className="flex gap-1 sm:gap-2 mb-2 sm:mb-4 items-center">
          <button onClick={undoLastStat} disabled={gameLog.length === 0} className="bg-yellow-600 text-white px-2 sm:px-4 py-2 rounded hover:bg-yellow-700 disabled:opacity-50 flex items-center gap-1 text-sm"><Undo size={15} /> Undo</button>
          <div className="flex-1 min-w-[2px]"></div>
          <button onClick={changePossession} className="bg-purple-600 text-white px-2 py-2 rounded hover:bg-purple-700 text-xs sm:text-sm whitespace-nowrap">⇄ Poss</button>
          <button onClick={endPeriod} disabled={currentPeriod >= 8} className="bg-orange-600 text-white px-2 sm:px-3 py-2 rounded hover:bg-orange-700 disabled:opacity-50 text-xs sm:text-sm whitespace-nowrap">End Q</button>
          {showEndGameConfirm ? (
            <div className="flex gap-1 items-center">
              <button onClick={() => { setShowEndGameConfirm(false); endGame(); }} className="bg-red-700 text-white px-2 py-2 rounded hover:bg-red-800 text-xs font-bold">End!</button>
              <button onClick={() => setShowEndGameConfirm(false)} className="bg-gray-500 text-white px-2 py-2 rounded hover:bg-gray-600 text-xs">✕</button>
            </div>
          ) : (
            <button onClick={() => setShowEndGameConfirm(true)} className="bg-red-600 text-white px-2 sm:px-3 py-2 rounded hover:bg-red-700 text-xs sm:text-sm whitespace-nowrap">End Game</button>
          )}
        </div>

        {/* Opponent Box */}
        <div className={`${darkMode ? 'bg-yellow-900/40' : 'bg-yellow-100'} border-2 sm:border-4 border-yellow-600 rounded-lg p-2 sm:p-3 mb-2 sm:mb-4 shadow-lg`}>
          <div className="flex justify-between items-center mb-1 sm:mb-3">
            <div className="text-sm sm:text-xl font-bold truncate">{currentGame.opponentName || 'Opponent'}</div>
            <button onClick={() => recordTimeout('them')} className="flex-shrink-0 bg-amber-600 hover:bg-amber-700 text-white text-xs px-2 py-1 rounded font-bold">T/O</button>
          </div>
          <div className="grid grid-cols-12 gap-0.5 sm:gap-1">
            {/* Left: Shots */}
            <div className="col-span-4 flex gap-0.5 sm:gap-1 items-stretch">
              <button onClick={() => startOppShotFlow('opp2M')} className="bg-green-600 hover:opacity-80 text-white text-sm px-1.5 sm:px-5 rounded font-medium self-stretch">2PM</button>
              <button onClick={() => startOppShotFlow('opp2X')} className="bg-red-600 hover:opacity-80 text-white text-sm px-1.5 sm:px-5 rounded font-medium self-stretch">2PX</button>
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="3PM" onClick={() => startOppShotFlow('opp3M')} color="bg-green-700" narrowShoot />
                <StatButton label="3PX" onClick={() => startOppShotFlow('opp3X')} color="bg-red-700" narrowShoot />
              </div>
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="FT" onClick={startOppFTFlow} color="bg-green-500" narrowShoot />
              </div>
            </div>
            {/* Middle: Other stats */}
            <div className="col-span-4 space-y-0.5 sm:space-y-1">
              <div className="flex gap-0.5 sm:gap-1 justify-center">
                <StatButton label="AST" onClick={() => recordStat('opponent', 'Ast')} color="bg-blue-600" wide />
                <StatButton label="STL" onClick={() => recordStat('opponent', 'Stl')} color="bg-indigo-600" wide />
                <StatButton label="BLK" onClick={() => recordStat('opponent', 'Blk')} color="bg-purple-600" wide />
              </div>
              <div className="flex gap-0.5 sm:gap-1 justify-center">
                <StatButton label="FJB" onClick={() => handleJumpBallClick('opponent', 'ForceJB')} color="bg-teal-600" wide />
                <StatButton label="CJB" onClick={() => handleJumpBallClick('opponent', 'ConcedeJB')} color="bg-pink-600" wide />
                <StatButton label="FOUL" onClick={() => recordStat('opponent', 'Foul')} color="bg-rose-600" wide />
              </div>
            </div>
            {/* Right: TOs and Rebounds */}
            <div className="col-span-4 flex gap-0.5 sm:gap-1 justify-end items-stretch">
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="LTO" onClick={() => recordStat('opponent', 'LiveTO')} color="bg-gray-600" shooting />
                <StatButton label="DTO" onClick={() => recordStat('opponent', 'DeadTO')} color="bg-gray-500" shooting />
              </div>
              <button onClick={() => recordStat('opponent', 'OffReb')} className="bg-yellow-600 hover:opacity-80 text-white text-sm px-1 sm:px-3 rounded font-medium self-stretch">OR</button>
              <button onClick={() => recordStat('opponent', 'DefReb')} className="bg-yellow-700 hover:opacity-80 text-white text-sm px-1 sm:px-3 rounded font-medium self-stretch">DR</button>
            </div>
          </div>
        </div>

        {/* Our Team Bubble */}
        <div className={`${darkMode ? 'bg-blue-950' : 'bg-blue-50'} border-2 sm:border-4 border-blue-500 rounded-lg p-2 sm:p-3 mb-2 sm:mb-4 shadow-lg`}>
          <div className="flex justify-between items-center mb-2">
            <div className="text-sm sm:text-base font-bold truncate">{currentGame.teamName}</div>
            <div className="flex gap-1">
              <button onClick={() => recordTimeout('us')} className="flex-shrink-0 bg-amber-600 hover:bg-amber-700 text-white text-xs px-2 py-1 rounded font-bold">T/O</button>
              <button onClick={openTeamSubModal} className="flex-shrink-0 bg-orange-500 hover:bg-orange-600 text-white text-xs px-2 py-1 rounded font-bold">SUB</button>
            </div>
          </div>
          <div className="grid grid-cols-5 gap-1">
            {(() => {
              const onCourtIdxs = onCourtSet.size > 0
                ? playerOrder.filter(idx => onCourtSet.has(idx))
                : playerOrder.slice(0, 5);
              const padded = [...onCourtIdxs.slice(0, 5)];
              while (padded.length < 5) padded.push(null);
              return padded.map((idx, i) => {
                const player = idx != null ? currentGame.players[idx] : null;
                return (
                  <div key={i} className={`${darkMode ? 'bg-blue-800' : 'bg-blue-200'} rounded-lg p-1 text-center`}>
                    {player ? (
                      <>
                        <div className="text-sm font-bold">#{player.number}</div>
                        <div className="text-xs truncate">{player.name}</div>
                        <div className={`text-xs ${theme.textMuted}`}>{player.stats?.Foul || 0}F</div>
                      </>
                    ) : (
                      <div className={`text-xs ${theme.textMuted} py-2`}>—</div>
                    )}
                  </div>
                );
              });
            })()}
          </div>
        </div>

        {/* Our Stat Buttons */}
        <div className={`${theme.card} border-2 border-blue-500 rounded-lg p-2 sm:p-3 mb-2 sm:mb-4 shadow-lg`}>
          <div className="grid grid-cols-12 gap-0.5 sm:gap-1">
            {/* Left: Shots + FT + Foul */}
            <div className="col-span-4 flex gap-0.5 sm:gap-1 items-stretch">
              <button onClick={() => startOurShotFlow('2ptMade')} className="bg-green-600 hover:opacity-80 text-white text-sm px-1.5 sm:px-5 rounded font-medium self-stretch">2PM</button>
              <button onClick={() => startOurShotFlow('2ptMiss')} className="bg-red-600 hover:opacity-80 text-white text-sm px-1.5 sm:px-5 rounded font-medium self-stretch">2PX</button>
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="3PM" onClick={() => startOurShotFlow('3ptMade')} color="bg-green-700" narrowShoot />
                <StatButton label="3PX" onClick={() => startOurShotFlow('3ptMiss')} color="bg-red-700" narrowShoot />
              </div>
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="FT" onClick={startFTFlow} color="bg-green-500" narrowShoot />
                <StatButton label="FOUL" onClick={() => startSimpleFlow('Foul')} color="bg-rose-600" narrowShoot />
              </div>
            </div>
            {/* Middle: OR/DR and FJB/CJB */}
            <div className="col-span-4 space-y-0.5 sm:space-y-1">
              <div className="flex gap-0.5 sm:gap-1 justify-center">
                <StatButton label="OR" onClick={() => startSimpleFlow('OffReb')} color="bg-yellow-600" wide />
                <StatButton label="DR" onClick={() => startSimpleFlow('DefReb')} color="bg-yellow-700" wide />
              </div>
              <div className="flex gap-0.5 sm:gap-1 justify-center">
                <StatButton label="FJB" onClick={() => startSimpleFlow('ForceJB')} color="bg-teal-600" wide />
                <StatButton label="CJB" onClick={() => startSimpleFlow('ConcedeJB')} color="bg-pink-600" wide />
              </div>
            </div>
            {/* Right: STL/LTO and BLK/DTO */}
            <div className="col-span-4 flex gap-0.5 sm:gap-1 justify-end items-stretch">
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="STL" onClick={() => startSimpleFlow('Stl')} color="bg-indigo-600" shooting />
                <StatButton label="BLK" onClick={() => startSimpleFlow('Blk')} color="bg-purple-600" shooting />
              </div>
              <div className="flex flex-col gap-0.5 sm:gap-1">
                <StatButton label="LTO" onClick={() => startSimpleFlow('LiveTO')} color="bg-gray-600" shooting />
                <StatButton label="DTO" onClick={() => startSimpleFlow('DeadTO')} color="bg-gray-500" shooting />
              </div>
            </div>
          </div>
        </div>
        {statFlow && (() => {
          const sf = statFlow;
          const onCourtPlayers = onCourtSet.size > 0
            ? playerOrder.filter(idx => onCourtSet.has(idx)).map(idx => ({ idx, player: currentGame.players[idx] }))
            : playerOrder.map(idx => ({ idx, player: currentGame.players[idx] }));
          const isMadeStat = sf.stat === '2ptMade' || sf.stat === '3ptMade';
          const isMissStat = sf.stat === '2ptMiss' || sf.stat === '3ptMiss';
          const isFTStat = sf.stat === 'FT';
          const isOppMade = sf.stat === 'opp2M' || sf.stat === 'opp3M';
          const isOppMiss = sf.stat === 'opp2X' || sf.stat === 'opp3X';
          // inlineRebGrid: plain function (not React component) to avoid remounting
          const inlineRebGrid = (outcomeKey) => (
            <div>
              <p className={`text-xs font-semibold ${theme.textMuted} mb-1`}>Who got the rebound?</p>
              <div className="grid grid-cols-2 gap-1 mb-1">
                {onCourtPlayers.map(({ idx, player }) => (
                  <button key={idx} onClick={() => completeStatFlow({ ...sf, data: { ...sf.data, outcome: outcomeKey, rebPlayerIndex: idx } })}
                    className="bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded text-sm font-medium">#{player.number} {player.name}</button>
                ))}
              </div>
              <button onClick={openTeamSubModal} className="w-full bg-orange-500 hover:bg-orange-600 text-white py-1.5 rounded text-xs font-bold mb-2">SUB — player not on court</button>
            </div>
          );

          const statLabel = {
            '2ptMade': '2PT Made', '2ptMiss': '2PT Miss', '3ptMade': '3PT Made', '3ptMiss': '3PT Miss',
            'FT': 'Free Throw', 'Stl': 'Steal', 'Blk': 'Block', 'OffReb': 'Off Reb', 'DefReb': 'Def Reb',
            'Foul': 'Foul', 'LiveTO': 'Live TO', 'DeadTO': 'Dead TO', 'ForceJB': 'Force JB', 'ConcedeJB': 'Concede JB',
            'opp2M': 'Opp 2PT Made', 'opp2X': 'Opp 2PT Miss', 'opp3M': 'Opp 3PT Made', 'opp3X': 'Opp 3PT Miss', 'oppFT': 'Opp Free Throw',
            'ftMissRebound': 'FT Miss — Rebound', 'oppFTMissRebound': 'Opp FT Miss — Rebound'
          };

          const stepTitle = {
            context: 'Shot Context', shotLoc: 'Where was the shot?', shotQuality: 'Shot Quality',
            byWho: 'Who?', assist: 'Assisted by?', outcome: 'What happened?',
            rebUs: 'Who got the rebound?', ftDetails: 'Free Throw',
            oppContext: 'Opp Shot Context', oppOutcome: 'What happened?',
            oppBlock: 'Who blocked?', oppOutcomeAfterBlock: 'After block — outcome?',
            oppRebUs: 'Who got the def rebound?', oppFTDetails: 'Opp Free Throw'
          };

          const playerGrid = (onSelect, excludeIdx = null, showUnknown = true) => (
            <div className="space-y-2">
              <div className="grid grid-cols-2 gap-2">
                {onCourtPlayers.filter(({ idx }) => idx !== excludeIdx).map(({ idx, player }) => (
                  <button key={idx} onClick={() => onSelect(idx)} className="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg text-sm font-medium">
                    #{player.number} {player.name}
                  </button>
                ))}
              </div>
              {showUnknown && <button onClick={() => onSelect('unknown')} className="w-full bg-gray-600 hover:bg-gray-700 text-white py-2 rounded-lg text-sm">Unknown</button>}
            </div>
          );

          // CourtSVG: prop is onCourtClick (not onClick) to avoid React synthetic event conflicts
          const courtSVGContent = (onCourtClick, markerX, markerY, isMade) => (
            <div className="relative bg-orange-200 rounded-lg" style={{ aspectRatio: '1/1' }}>
              <svg viewBox="0 0 50 50" className="w-full h-full cursor-crosshair" onClick={(e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                onCourtClick(x, y);
              }}>
                <rect x="0" y="0" width="50" height="50" fill="#CD853F" stroke="#fff" strokeWidth="0.5"/>
                <rect x="0" y="17" width="19" height="16" fill="none" stroke="#fff" strokeWidth="0.3"/>
                <circle cx="19" cy="25" r="6" fill="none" stroke="#fff" strokeWidth="0.3"/>
                <path d="M 0 3 L 14 3 A 23.75 23.75 0 0 1 14 47 L 0 47" fill="none" stroke="#fff" strokeWidth="0.3"/>
                <path d="M 4 21 A 4 4 0 0 1 4 29" fill="none" stroke="#fff" strokeWidth="0.3"/>
                <circle cx="5.25" cy="25" r="0.75" fill="none" stroke="#fff" strokeWidth="0.3"/>
                <line x1="4" y1="22" x2="4" y2="28" stroke="#fff" strokeWidth="0.5"/>
                {markerX !== undefined && (isMade
                  ? <circle cx={markerX * 0.5} cy={markerY * 0.5} r="1" fill="#22c55e" stroke="#fff" strokeWidth="0.15"/>
                  : <text x={markerX * 0.5} y={markerY * 0.5} textAnchor="middle" dominantBaseline="middle" fill="#ef4444" fontSize="2.5" fontWeight="bold" stroke="#fff" strokeWidth="0.1">✕</text>
                )}
              </svg>
              {markerX === undefined && <div className="absolute bottom-2 left-2 text-xs text-white bg-black/50 px-2 py-1 rounded">Tap where shot was taken</div>}
              {markerX !== undefined && <div className="absolute bottom-2 left-2 text-xs text-white bg-black/50 px-2 py-1 rounded">Tap to reposition</div>}
            </div>
          );

          const qualityButtons = (is2ndChance) => {
            if (is2ndChance) return (
              <div>
                <p className="text-center text-sm font-bold mb-2 text-yellow-500">2nd Chance</p>
                <div className="flex gap-2 justify-center">
                  {['A','B','C'].map(q => (
                    <button key={q} onClick={() => advanceFlow({ step: 'byWho', data: { ...sf.data, shotQuality: q, context: '2ndChance' } })}
                      className={`flex-1 py-4 rounded-lg text-xl font-bold ${q==='A'?'bg-green-500':q==='B'?'bg-yellow-500':'bg-red-500'} text-white hover:opacity-90`}>{q}</button>
                  ))}
                </div>
              </div>
            );
            return (
              <div>
                <p className="text-center text-sm font-bold mb-1 text-blue-500">Transition</p>
                <div className="flex gap-2 justify-center mb-3">
                  {['A','B','C'].map(q => (
                    <button key={`t${q}`} onClick={() => advanceFlow({ step: 'byWho', data: { ...sf.data, shotQuality: q, context: 'Transition' } })}
                      className={`flex-1 py-4 rounded-lg text-xl font-bold ${q==='A'?'bg-green-500':q==='B'?'bg-yellow-500':'bg-red-500'} text-white hover:opacity-90`}>{q}</button>
                  ))}
                </div>
                <p className="text-center text-sm font-bold mb-1 text-orange-500">½ Court</p>
                <div className="flex gap-2 justify-center">
                  {['A','B','C'].map(q => (
                    <button key={`h${q}`} onClick={() => advanceFlow({ step: 'byWho', data: { ...sf.data, shotQuality: q, context: 'HalfCourt' } })}
                      className={`flex-1 py-4 rounded-lg text-xl font-bold ${q==='A'?'bg-green-500':q==='B'?'bg-yellow-500':'bg-red-500'} text-white hover:opacity-90`}>{q}</button>
                  ))}
                </div>
                <p className={`text-center text-xs ${theme.textMuted} mt-2`}>A = Wide Open • B = Average • C = Contested</p>
              </div>
            );
          };

          return (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
              <div className={`${theme.card} ${theme.text} rounded-lg p-4 max-w-md w-full max-h-[90vh] overflow-y-auto`}>
                <div className="flex justify-between items-center mb-3">
                  <div>
                    <h3 className="text-lg font-bold">{stepTitle[sf.step] || sf.step}</h3>
                    <p className={`text-xs ${theme.textMuted}`}>{statLabel[sf.stat] || sf.stat}</p>
                  </div>
                  <button onClick={cancelFlow} className="p-1 flex-shrink-0"><X size={24} /></button>
                </div>

                {/* context step */}
                {sf.step === 'context' && (
                  <div className="space-y-2">
                    {sf.data.suggestedContext === '2ndChance' && <p className="text-xs text-yellow-500 text-center">Suggested: 2nd Chance (after off. reb.)</p>}
                    <button onClick={() => advanceFlow({ step: 'byWho', data: { ...sf.data, context: 'Transition' } })} className={`w-full py-4 rounded-lg text-lg font-bold text-white hover:opacity-90 ${sf.data.suggestedContext==='Transition'?'ring-2 ring-white':''} bg-blue-600`}>Transition</button>
                    <button onClick={() => advanceFlow({ step: 'byWho', data: { ...sf.data, context: 'HalfCourt' } })} className={`w-full py-4 rounded-lg text-lg font-bold text-white hover:opacity-90 bg-orange-600`}>½ Court</button>
                    <button onClick={() => advanceFlow({ step: 'byWho', data: { ...sf.data, context: '2ndChance' } })} className={`w-full py-4 rounded-lg text-lg font-bold text-white hover:opacity-90 ${sf.data.suggestedContext==='2ndChance'?'ring-2 ring-white':''} bg-yellow-600`}>2nd Chance</button>
                  </div>
                )}

                {/* shotLoc step */}
                {sf.step === 'shotLoc' && (
                  <div className="space-y-2">
                    {sf.data.suggestedContext === '2ndChance' && <p className="text-xs text-yellow-500 text-center">Suggested: 2nd Chance (after off. reb.)</p>}
                    {courtSVGContent((x, y) => advanceFlow({ step: 'shotQuality', data: { ...sf.data, shotX: x, shotY: y } }), undefined, undefined, isMadeStat)}
                    <button onClick={() => advanceFlow({ step: 'context', data: sf.data })} className={`text-xs ${theme.textMuted} underline w-full text-center`}>Skip shot location</button>
                  </div>
                )}

                {/* shotQuality step */}
                {sf.step === 'shotQuality' && (
                  <div className="space-y-3">
                    {courtSVGContent((x, y) => advanceFlow({ data: { ...sf.data, shotX: x, shotY: y } }), sf.data.shotX, sf.data.shotY, isMadeStat)}
                    {qualityButtons(sf.data.suggestedContext === '2ndChance')}
                  </div>
                )}

                {/* byWho step */}
                {sf.step === 'byWho' && playerGrid((idx) => {
                  if (isMadeStat && idx !== 'unknown') advanceFlow({ step: 'assist', data: { ...sf.data, playerIndex: idx } });
                  else if (isMadeStat && idx === 'unknown') completeStatFlow({ ...sf, data: { ...sf.data, playerIndex: idx } });
                  else if (isMissStat) advanceFlow({ step: 'outcome', data: { ...sf.data, playerIndex: idx } });
                  else if (isFTStat && idx !== 'unknown') advanceFlow({ step: 'ftDetails', data: { ...sf.data, playerIndex: idx, ftCount: 2, s1: undefined, s2: undefined, context: sf.data.suggestedContext || 'HalfCourt' } });
                  else completeStatFlow({ ...sf, data: { ...sf.data, playerIndex: idx } });
                })}

                {/* assist step */}
                {sf.step === 'assist' && (
                  <div className="space-y-2">
                    {playerGrid((idx) => completeStatFlow({ ...sf, data: { ...sf.data, assistPlayerIndex: idx } }), sf.data.playerIndex, false)}
                    <button onClick={() => completeStatFlow({ ...sf, data: { ...sf.data, assistPlayerIndex: null } })} className="w-full bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-bold">No Assist</button>
                  </div>
                )}

                {/* outcome step (our miss) — inline rebound player selection */}
                {sf.step === 'outcome' && (
                  <div className="space-y-2">
                    {inlineRebGrid('rebUs')}
                    <button onClick={() => completeStatFlow({ ...sf, data: { ...sf.data, outcome: 'rebThem' } })} className="w-full bg-red-700 hover:opacity-90 text-white py-3 rounded-lg font-bold">Their Rebound</button>
                    <button onClick={() => completeStatFlow({ ...sf, data: { ...sf.data, outcome: 'oobThem' } })} className="w-full bg-gray-600 hover:opacity-90 text-white py-3 rounded-lg font-bold">OOB — Their Ball</button>
                    <button onClick={() => completeStatFlow({ ...sf, data: { ...sf.data, outcome: 'oobUs' } })} className="w-full bg-gray-500 hover:opacity-90 text-white py-3 rounded-lg font-bold">OOB — Our Ball</button>
                  </div>
                )}

                {/* ftDetails step */}
                {sf.step === 'ftDetails' && (() => {
                  const { ftCount = 2, s1, s2, s3, context = 'HalfCourt' } = sf.data;
                  const ftBtnCls = (selected, color) => `flex-1 py-2.5 rounded-lg font-bold text-sm text-white transition-all ${selected ? `${color} ring-2 ring-white scale-105` : `${color} opacity-40 hover:opacity-70`}`;
                  return (
                    <div className="space-y-3">
                      <div>
                        <p className={`text-xs font-semibold mb-1.5 ${theme.textMuted}`}>How many free throws?</p>
                        <div className="flex gap-2">
                          {[1,2,3].map(n => (
                            <button key={n} onClick={() => advanceFlow({ data: { ...sf.data, ftCount: n } })}
                              className={`flex-1 py-2.5 rounded-lg font-bold text-xl ${ftCount===n ? 'bg-blue-600 text-white ring-2 ring-blue-300' : `${darkMode?'bg-gray-700':'bg-gray-200'} ${theme.text}`}`}>{n}</button>
                          ))}
                        </div>
                      </div>
                      <div className="space-y-1.5">
                        {ftCount >= 1 && (
                          <div className="flex gap-2 items-center">
                            <span className={`text-sm font-semibold w-8 flex-shrink-0 ${theme.text}`}>FT1</span>
                            <button onClick={() => advanceFlow({ data: { ...sf.data, s1: true } })} className={ftBtnCls(s1 === true, 'bg-green-600')}>✓ Made</button>
                            <button onClick={() => advanceFlow({ data: { ...sf.data, s1: false } })} className={ftBtnCls(s1 === false, 'bg-red-600')}>✕ Miss</button>
                          </div>
                        )}
                        {ftCount >= 2 && (
                          <div className="flex gap-2 items-center">
                            <span className={`text-sm font-semibold w-8 flex-shrink-0 ${theme.text}`}>FT2</span>
                            <button onClick={() => advanceFlow({ data: { ...sf.data, s2: true } })} className={ftBtnCls(s2 === true, 'bg-green-600')}>✓ Made</button>
                            <button onClick={() => advanceFlow({ data: { ...sf.data, s2: false } })} className={ftBtnCls(s2 === false, 'bg-red-600')}>✕ Miss</button>
                          </div>
                        )}
                        {ftCount >= 3 && (
                          <div className="flex gap-2 items-center">
                            <span className={`text-sm font-semibold w-8 flex-shrink-0 ${theme.text}`}>FT3</span>
                            <button onClick={() => advanceFlow({ data: { ...sf.data, s3: true } })} className={ftBtnCls(s3 === true, 'bg-green-600')}>✓ Made</button>

(null); setScreen('gameLog'); }} onSummary={() => { setSummaryBackScreen('boxScore'); setScreen('summary'); }} />;

const RotationsScreen = ({ game, rotations, onBack, darkMode, theme, autoDownload, onAutoDownloadDone, isEndGameView, onStatEntry, onBoxScore, onGameLog, onMainMenu, onSummary, onShotChart }) => {
  const rotationsRef = useRef(null);
  const [showMMConfirm, setShowMMConfirm] = React.useState(false);
  const getTotalPoss = (rot) => (rot.offPoss || 0) + (rot.defPoss || 0);
  const sorted = [...rotations].sort((a, b) => getTotalPoss(b) - getTotalPoss(a));
  const getPlayerName = (idx) => { const p = game.players[idx]; return p ? p.name : `Player ${idx}`; };
  const fgPct = (m, a) => a === 0 ? '-' : `${Math.round((m / a) * 100)}% [${m}/${a}]`;
  const signed = (v) => v > 0 ? `+${v}` : `${v}`;
  const signColor = (v) => v > 0 ? 'text-green-500' : v < 0 ? 'text-red-500' : '';

  const exportJPG = async () => {
    if (!rotationsRef.current) return;
    try {
      const canvas = await html2canvas(rotationsRef.current, { backgroundColor: darkMode ? '#1f2937' : '#ffffff', scale: 2 });
      const link = document.createElement('a');
      link.download = `${game.date} - ${game.teamName} vs ${game.opponentName || 'Opponent'} - Rotations.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } catch (e) { console.error('Export failed:', e); }
  };

  const getORate = (rot) => rot.offPoss > 0 ? Math.round(100 * (rot.offPoints || 0) / rot.offPoss) : '-';
  const getDRate = (rot) => rot.defPoss > 0 ? Math.round(100 * (rot.defPoints || 0) / rot.defPoss) : '-';
  const getNetRate = (rot) => {
    if (!rot.offPoss || !rot.defPoss) return '-';
    return Math.round((100 * (rot.offPoints || 0) / rot.offPoss) - (100 * (rot.defPoints || 0) / rot.defPoss));
  };

  const exportCSV = () => {
    const headers = ['Rotation #', 'Lineup', 'Poss', 'ORate', 'DRate', 'NetRate', '+/-', 'REB±', 'TO±', 'Team FG%', 'Opp FG%'];
    const rows = [`${game.teamName} — Rotations`, `${game.date}`, '', headers.join(',')];
    sorted.forEach((rot, idx) => {
      const lineup = rot.players.map(i => getPlayerName(i)).join(' / ');
      rows.push([idx + 1, `"${lineup}"`, getTotalPoss(rot), getORate(rot), getDRate(rot), getNetRate(rot), rot.plusMinus >= 0 ? `+${rot.plusMinus}` : rot.plusMinus, rot.rebDiff >= 0 ? `+${rot.rebDiff}` : rot.rebDiff, rot.toDiff >= 0 ? `+${rot.toDiff}` : rot.toDiff, `"${fgPct(rot.teamFGMade, rot.teamFGAtt)}"`, `"${fgPct(rot.oppFGMade, rot.oppFGAtt)}"`].join(','));
    });
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const link = document.createElement('a');
    link.download = `${game.date} - ${game.teamName} vs ${game.opponentName || 'Opponent'} - Rotations.csv`;
    link.href = URL.createObjectURL(blob);
    link.click();
  };

  useEffect(() => {
    if (autoDownload) {
      const timer = setTimeout(() => {
        exportJPG().then(() => {
          if (onAutoDownloadDone) onAutoDownloadDone();
        });
      }, 200);
      return () => clearTimeout(timer);
    }
  }, [autoDownload]);

  return (
    <div className={`min-h-screen ${theme.bg} ${theme.text} p-4 max-w-6xl mx-auto`}>
      <div className="flex gap-1 mb-4 items-center min-w-0">

          {!isEndGameView && onStatEntry && <button onClick={onStatEntry} className="flex-shrink-0 bg-blue-600 text-white px-2 sm:px-3 py-2 rounded hover:bg-blue-700 text-xs sm:text-sm whitespace-nowrap">Stat Entry</button>}

        </div>

                  const netRate = getNetRate(rot);

                  return (
                    <tr key={rot.key} className={`border-b ${theme.border} ${rowBg}`}>
                      <td className="p-2 text-xs">{rot.players.map((pi, i) => (i > 0 ? ' / ' : '') + getPlayerName(pi)).join('')}</td>
                      <td className="p-2 text-center">{getTotalPoss(rot)}</td>

                      <td className="p-2 text-center">{getDRate(rot)}</td>
                      <td className={`p-2 text-center font-bold ${netRateNum !== null ? (netRateNum > 0 ? 'text-green-500' : netRateNum < 0 ? 'text-red-500' : '') : ''}`}>{netRate !== '-' && netRateNum > 0 ? '+' : ''}{netRate}</td>
                      <td className={`p-2 text-center font-bold ${signColor(rot.plusMinus)}`}>{signed(rot.plusMinus)}</td>
                      <td className={`p-2 text-center font-bold ${signColor(rot.rebDiff)}`}>{signed(rot.rebDiff)}</td>
                      <td className={`p-2 text-center font-bold ${signColor(rot.toDiff)}`}>{signed(rot.toDiff)}</td>
                      <td className="p-2 text-center">{fgPct(rot.teamFGMade, rot.teamFGAtt)}</td>
                      <td className="p-2 text-center">{fgPct(rot.oppFGMade, rot.oppFGAtt)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
};

const BoxScore = ({ game, onBack, onMainMenu, filterPeriod, setFilterPeriod, darkMode, theme, onViewShotChart, toggleDarkMode, isEndGameView, calculatePlayerPoints, getPlayerRebounds, gameLog, rotations = [], onViewRotations, onDownloadRotationsJPG, onDownloadSummaryJPG, onResumeGame, onStatEntry, onGameLog, onSummary }) => {
  const boxScoreRef = useRef(null);
  const shotChartRef = useRef(null);
  const [showMMConfirm, setShowMMConfirm] = React.useState(false);
  const [showDownloads, setShowDownloads] = React.useState(false);
  const getFilteredStats = (entity) => filterPeriod === 'Total' ? entity.stats || {} : entity.periodStats?.[parseInt(filterPeriod)] || {};

  const calculateTeamTotals = () => {
    const totals = {};
    game.players.forEach(player => {
      const stats = getFilteredStats(player);
      Object.keys(stats).forEach(key => { totals[key] = (totals[key] || 0) + (stats[key] || 0); });
    });
    return totals;
  };

  const formatShooting = (made, missed) => {
    const total = made + missed;
    if (total === 0) return '';
    return `${made}/${total} (${Math.round((made / total) * 100)}%)`;
  };

  const getSortedPlayers = () => {
    if (!isEndGameView) return game.players.map((p, idx) => ({ ...p, originalIndex: idx }));
    return game.players.map((p, idx) => ({ ...p, originalIndex: idx })).sort((a, b) => {
      const aPoints = calculatePlayerPoints(a);
      const bPoints = calculatePlayerPoints(b);
      if (bPoints !== aPoints) return bPoints - aPoints;
      const aReb = getPlayerRebounds(a);
      const bReb = getPlayerRebounds(b);
      if (bReb !== aReb) return bReb - aReb;
      const aAst = a.stats?.Ast || 0;
      const bAst = b.stats?.Ast || 0;
      return bAst - aAst;
    });
  };

  const sortedPlayers = getSortedPlayers();
  const teamTotals = calculateTeamTotals();
  const opponentStats = getFilteredStats(game.opponent);
  const teamScore = (teamTotals['2ptMade'] || 0) * 2 + (teamTotals['3ptMade'] || 0) * 3 + (teamTotals['FTMade'] || 0);
  const oppScore = (opponentStats['2ptMade'] || 0) * 2 + (opponentStats['3ptMade'] || 0) * 3 + (opponentStats['FTMade'] || 0);
  const periods = []; for (let i = 1; i <= (game.maxPeriod || 1); i++) periods.push(i);
  const opponentName = game.opponentName || 'Opponent';

  const getPlayerRatings = (originalIndex) => {
    if (filterPeriod !== 'Total') {
      // Reconstruct from game log for the specific period
      const period = parseInt(filterPeriod);
      if (!gameLog || gameLog.length === 0) return { oRate: null, dRate: null, poss: 0 };
      let ourFGA = 0, oppFGA = 0, ourTO = 0, oppTO = 0, ourPts = 0, oppPts = 0;
      gameLog.forEach(entry => {
        if (entry.period !== period) return;
        if (!entry.rotKey) return;
        const players = entry.rotKey.split(',').map(Number);
        if (!players.includes(originalIndex)) return;
        const d = entry.rotDeltas;
        if (d) {
          ourFGA += d.rTFGA || 0;
          oppFGA += d.rOFGA || 0;
          if ((d.rTo || 0) < 0) ourTO += 1;
          if ((d.rTo || 0) > 0) oppTO += 1;
        }
        if (entry.pmDelta) {
          if (entry.pmDelta > 0) ourPts += entry.pmDelta;
          else oppPts += Math.abs(entry.pmDelta);
        }
      });
      const ourPoss = ourFGA + ourTO;
      const oppPoss = oppFGA + oppTO;
      return {
        oRate: ourPoss > 0 ? Math.round(ourPts / ourPoss * 100) : null,
        dRate: oppPoss > 0 ? Math.round(oppPts / oppPoss * 100) : null,
        poss: ourPoss + oppPoss,
      };
    }
    // Total: use rotations data
    if (!rotations || rotations.length === 0) return { oRate: null, dRate: null, poss: game.players[originalIndex]?.stats?.poss || 0 };
    let offPts = 0, defPts = 0, offPoss = 0, defPoss = 0;
    rotations.forEach(rot => {
      if (rot.players.includes(originalIndex)) {
        offPts += rot.offPoints || 0;
        defPts += rot.defPoints || 0;
        offPoss += rot.offPoss || 0;
        defPoss += rot.defPoss || 0;
      }
    });
    return {
      oRate: offPoss > 0 ? Math.round(offPts / offPoss * 100) : null,
      dRate: defPoss > 0 ? Math.round(defPts / defPoss * 100) : null,
      poss: offPoss + defPoss,
    };
  };

  const getPeriodPlusMinus = (originalIndex) => {
    if (filterPeriod === 'Total') return game.players[originalIndex]?.stats?.plusMinus || 0;
    if (!gameLog || gameLog.length === 0) return 0;
    return gameLog.reduce((sum, entry) => {
      if (entry.pmDelta && entry.pmPlayers && entry.period === parseInt(filterPeriod)) {
        if (entry.pmPlayers.includes(originalIndex)) return sum + entry.pmDelta;
      }
      return sum;
    }, 0);
  };

  const getFilenameBase = () => `${game.date} - ${game.teamName} vs ${opponentName}`;

  const qualityLabel = (q) => {
    if (q === 'A' || q === 1) return 'A';
    if (q === 'B' || q === 2) return 'B';
    if (q === 'C' || q === 3) return 'C';
    return q;
  };

  const getAllTeamShots = () => game.players.flatMap((p, idx) => (p.shotChart || []).map(shot => ({ ...shot, playerIndex: idx, playerName: `#${p.number} ${p.name}` })));
  const allShots = getAllTeamShots();
  const madeCount = allShots.filter(s => s.made).length;
  const missedCount = allShots.filter(s => !s.made).length;
  const fgPct = madeCount + missedCount > 0 ? Math.round((madeCount / (madeCount + missedCount)) * 100) : 0;

  const exportBoxScoreJPG = async () => {
    if (!boxScoreRef.current) return;
    try {
      const canvas = await html2canvas(boxScoreRef.current, { backgroundColor: darkMode ? '#1f2937' : '#ffffff', scale: 2 });
      const link = document.createElement('a');
      link.download = `${getFilenameBase()} - Box Score.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } catch (e) { console.error('Export failed:', e); }
  };

  const exportBoxScoreCSV = () => {
    const getQualityStr = (shots, q) => {
      const qShots = shots.filter(s => qualityLabel(s.quality) === q);
      const qMade = qShots.filter(s => s.made).length;
      const qPct = qShots.length > 0 ? Math.round((qMade / qShots.length) * 100) : 0;
      return `${q}: ${qMade}/${qShots.length} ${qPct}%`;
    };

    const headers = ['Player', 'FGM', 'FGA', 'FG%', '3ptM', '3PTA', '3P%', 'FTM', 'FTA', 'FT%', 'OREB', 'DREB', 'AST', 'STL', 'BLK', 'LTO', 'DTO', 'FJB', 'CJB', 'PF', 'PTS', '+/-', 'Quality A', 'Quality B', 'Quality C'];
    const rows = [`${game.teamName} v ${opponentName} - Box Score`, `${game.date} @ ${game.location || 'N/A'}`, '', headers.join(',')];

    sortedPlayers.forEach(player => {
      const stats = getFilteredStats(player);
      const fgMade = (stats['2ptMade'] || 0) + (stats['3ptMade'] || 0);
      const fgMiss = (stats['2ptMiss'] || 0) + (stats['3ptMiss'] || 0);
      const fgPct = fgMade + fgMiss > 0 ? Math.round((fgMade / (fgMade + fgMiss)) * 100) : 0;
      const threePct = (stats['3ptMade'] || 0) + (stats['3ptMiss'] || 0) > 0 ? Math.round(((stats['3ptMade'] || 0) / ((stats['3ptMade'] || 0) + (stats['3ptMiss'] || 0))) * 100) : 0;
      const ftPct = (stats['FTMade'] || 0) + (stats['FTMiss'] || 0) > 0 ? Math.round(((stats['FTMade'] || 0) / ((stats['FTMade'] || 0) + (stats['FTMiss'] || 0))) * 100) : 0;
      const points = (stats['2ptMade'] || 0) * 2 + (stats['3ptMade'] || 0) * 3 + (stats['FTMade'] || 0);
      const playerShots = player.shotChart || [];
      rows.push([
        `"#${player.number} ${player.name}"`, fgMade, fgMade + fgMiss, `${fgPct}%`,
        stats['3ptMade'] || 0, (stats['3ptMade'] || 0) + (stats['3ptMiss'] || 0), `${threePct}%`,
        stats['FTMade'] || 0, (stats['FTMade'] || 0) + (stats['FTMiss'] || 0), `${ftPct}%`,
        stats['OffReb'] || 0, stats['DefReb'] || 0, stats['Ast'] || 0, stats['Stl'] || 0, stats['Blk'] || 0,
        stats['LiveTO'] || 0, stats['DeadTO'] || 0, stats['ForceJB'] || 0, stats['ConcedeJB'] || 0, stats['Foul'] || 0, points, player.stats?.plusMinus || 0,
        `"${getQualityStr(playerShots, 'A')}"`, `"${getQualityStr(playerShots, 'B')}"`, `"${getQualityStr(playerShots, 'C')}"`
      ].join(','));
    });

    // Team totals
    const tfgMade = (teamTotals['2ptMade'] || 0) + (teamTotals['3ptMade'] || 0);
    const tfgMiss = (teamTotals['2ptMiss'] || 0) + (teamTotals['3ptMiss'] || 0);
    const tfgPct = tfgMade + tfgMiss > 0 ? Math.round((tfgMade / (tfgMade + tfgMiss)) * 100) : 0;
    const t3Pct = (teamTotals['3ptMade'] || 0) + (teamTotals['3ptMiss'] || 0) > 0 ? Math.round(((teamTotals['3ptMade'] || 0) / ((teamTotals['3ptMade'] || 0) + (teamTotals['3ptMiss'] || 0))) * 100) : 0;
    const tftPct = (teamTotals['FTMade'] || 0) + (teamTotals['FTMiss'] || 0) > 0 ? Math.round(((teamTotals['FTMade'] || 0) / ((teamTotals['FTMade'] || 0) + (teamTotals['FTMiss'] || 0))) * 100) : 0;
    rows.push([
      '"TEAM"', tfgMade, tfgMade + tfgMiss, `${tfgPct}%`,
      teamTotals['3ptMade'] || 0, (teamTotals['3ptMade'] || 0) + (teamTotals['3ptMiss'] || 0), `${t3Pct}%`,
      teamTotals['FTMade'] || 0, (teamTotals['FTMade'] || 0) + (teamTotals['FTMiss'] || 0), `${tftPct}%`,
      teamTotals['OffReb'] || 0, teamTotals['DefReb'] || 0, teamTotals['Ast'] || 0, teamTotals['Stl'] || 0, teamTotals['Blk'] || 0,
      teamTotals['LiveTO'] || 0, teamTotals['DeadTO'] || 0, teamTotals['ForceJB'] || 0, teamTotals['ConcedeJB'] || 0, teamTotals['Foul'] || 0, teamScore,
      `"${getQualityStr(allShots, 'A')}"`, `"${getQualityStr(allShots, 'B')}"`, `"${getQualityStr(allShots, 'C')}"`
    ].join(','));

    // Opponent
    const ofgMade = (opponentStats['2ptMade'] || 0) + (opponentStats['3ptMade'] || 0);
    const ofgMiss = (opponentStats['2ptMiss'] || 0) + (opponentStats['3ptMiss'] || 0);
    const ofgPct = ofgMade + ofgMiss > 0 ? Math.round((ofgMade / (ofgMade + ofgMiss)) * 100) : 0;
    const o3Pct = (opponentStats['3ptMade'] || 0) + (opponentStats['3ptMiss'] || 0) > 0 ? Math.round(((opponentStats['3ptMade'] || 0) / ((opponentStats['3ptMade'] || 0) + (opponentStats['3ptMiss'] || 0))) * 100) : 0;
    const oftPct = (opponentStats['FTMade'] || 0) + (opponentStats['FTMiss'] || 0) > 0 ? Math.round(((opponentStats['FTMade'] || 0) / ((opponentStats['FTMade'] || 0) + (opponentStats['FTMiss'] || 0))) * 100) : 0;
    rows.push([
      '"OPPONENT"', ofgMade, ofgMade + ofgMiss, `${ofgPct}%`,
      opponentStats['3ptMade'] || 0, (opponentStats['3ptMade'] || 0) + (opponentStats['3ptMiss'] || 0), `${o3Pct}%`,
      opponentStats['FTMade'] || 0, (opponentStats['FTMade'] || 0) + (opponentStats['FTMiss'] || 0), `${oftPct}%`,
      opponentStats['OffReb'] || 0, opponentStats['DefReb'] || 0, opponentStats['Ast'] || 0, opponentStats['Stl'] || 0, opponentStats['Blk'] || 0,
      opponentStats['LiveTO'] || 0, opponentStats['DeadTO'] || 0, opponentStats['ForceJB'] || 0, opponentStats['ConcedeJB'] || 0, opponentStats['Foul'] || 0, oppScore,
      '""', '""', '""'
    ].join(','));

    // Rotations tab
    if (rotations && rotations.length > 0) {
      rows.push('', '', '--- ROTATIONS ---', '');
      rows.push(['Lineup', 'Count', '+/-', 'REB±', 'TO±', 'Team FG%', 'Opp FG%'].join(','));
      const rotFgPct = (m, a) => a === 0 ? '-' : `${Math.round((m / a) * 100)}% [${m}/${a}]`;
      [...rotations].sort((a, b) => b.plusMinus - a.plusMinus).forEach(rot => {
        const lineup = rot.players.map(i => { const p = game.players[i]; return p ? p.name : `Player ${i}`; }).join(' / ');
        const pm = rot.plusMinus >= 0 ? `+${rot.plusMinus}` : `${rot.plusMinus}`;
        const reb = rot.rebDiff >= 0 ? `+${rot.rebDiff}` : `${rot.rebDiff}`;
        const to = rot.toDiff >= 0 ? `+${rot.toDiff}` : `${rot.toDiff}`;
        rows.push([`"${lineup}"`, rot.count, pm, reb, to, `"${rotFgPct(rot.teamFGMade, rot.teamFGAtt)}"`, `"${rotFgPct(rot.oppFGMade, rot.oppFGAtt)}"`].join(','));
      });

    if (gameLog && gameLog.length > 0) {

    const csv = rows.join('\n');

                    <td className="p-2 text-center">{stats['Stl'] || 0}</td>

                    <td className="p-2 text-center">{stats['Foul'] || 0}</td>

                    <td className="p-2 text-center">
                      {(oRate !== null || dRate !== null) ? (
                        <div>
                          <span className={`font-bold ${oColor(idx)}`}>{oRate ?? '-'}</span>
                          <span className={theme.textMuted}>/</span>
                          <span className={`font-bold ${dColor(idx)}`}>{dRate ?? '-'}</span>
                        </div>
                      ) : <span className={theme.textMuted}>-</span>}
                    </td>
                    <td className="p-2 text-center">{poss}</td>
                    {game.enableShotChart && <td className="p-2 text-center"><button onClick={() => onViewShotChart(player.originalIndex)} className="bg-cyan-600 text-white px-2 py-1 rounded text-xs hover:bg-cyan-700">View</button></td>}
                  </tr>
                );
              })}
              <tr className={`font-bold ${darkMode ? 'bg-orange-900/50' : 'bg-orange-100'}`}>
                <td className="p-2">TEAM</td>
                <td className="p-2 text-center">{formatShooting((teamTotals['2ptMade'] || 0) + (teamTotals['3ptMade'] || 0), (teamTotals['2ptMiss'] || 0) + (teamTotals['3ptMiss'] || 0))}</td>
                <td className="p-2 text-center">{formatShooting(teamTotals['3ptMade'] || 0, teamTotals['3ptMiss'] || 0)}</td>
                <td className="p-2 text-center">{formatShooting(teamTotals['FTMade'] || 0, teamTotals['FTMiss'] || 0)}</td>
                <td className="p-2 text-center">{teamScore}</td>
                <td className="p-2 text-center"><div>{(teamTotals['OffReb'] || 0) + (teamTotals['DefReb'] || 0)}</div><div className={`text-[10px] ${theme.textMuted}`}>({teamTotals['OffReb'] || 0}/{teamTotals['DefReb'] || 0})</div></td>
                <td className="p-2 text-center">{teamTotals['Ast'] || 0}</td>
                <td className="p-2 text-center">{teamTotals['Stl'] || 0}</td>
                <td className="p-2 text-center">{teamTotals['Blk'] || 0}</td>
                <td className="p-2 text-center"><div>{(teamTotals['LiveTO'] || 0) + (teamTotals['DeadTO'] || 0)}</div><div className={`text-[10px] ${theme.textMuted}`}>({teamTotals['LiveTO'] || 0}/{teamTotals['DeadTO'] || 0})</div></td>
                <td className="p-2 text-center"><div>{(teamTotals['ForceJB'] || 0) + (teamTotals['ConcedeJB'] || 0)}</div><div className={`text-[10px] ${theme.textMuted}`}>({teamTotals['ForceJB'] || 0}/{teamTotals['ConcedeJB'] || 0})</div></td>
                <td className="p-2 text-center">{teamTotals['Foul'] || 0}</td>
                <td className="p-2 text-center"></td>

                <td className="p-2 text-center"><div>{(opponentStats['OffReb'] || 0) + (opponentStats['DefReb'] || 0)}</div><div className={`text-[10px] ${theme.textMuted}`}>({opponentStats['OffReb'] || 0}/{opponentStats['DefReb'] || 0})</div></td>
                <td className="p-2 text-center">{opponentStats['Ast'] || 0}</td>
                <td className="p-2 text-center">{opponentStats['Stl'] || 0}</td>
                <td className="p-2 text-center">{opponentStats['Blk'] || 0}</td>
                <td className="p-2 text-center"><div>{(opponentStats['LiveTO'] || 0) + (opponentStats['DeadTO'] || 0)}</div><div className={`text-[10px] ${theme.textMuted}`}>({opponentStats['LiveTO'] || 0}/{opponentStats['DeadTO'] || 0})</div></td>
                <td className="p-2 text-center"><div>{(opponentStats['ForceJB'] || 0) + (opponentStats['ConcedeJB'] || 0)}</div><div className={`text-[10px] ${theme.textMuted}`}>({opponentStats['ForceJB'] || 0}/{opponentStats['ConcedeJB'] || 0})</div></td>
                <td className="p-2 text-center">{opponentStats['Foul'] || 0}</td>

                <td className="p-2 text-center"></td>
                {game.enableShotChart && <td className="p-2"></td>}
              </tr>
            </tbody>
          </table>
            );
          })()}
        </div>
        <p className={`text-xs ${theme.textMuted} mt-4`}>{game.date} • {game.location}</p>
      </div>
      {isEndGameView && game.enableShotChart && allShots.length > 0 && (
        <div ref={shotChartRef} className={`${theme.card} rounded-lg shadow-lg p-4 mt-4`}>
          <h2 className="text-xl font-bold mb-1">{game.teamName} v {opponentName} - Shot Chart</h2>
          <p className={`text-sm ${theme.textMuted} mb-2`}>{game.date} @ {game.location || 'N/A'}</p>
          <p className={`text-sm ${theme.textMuted} mb-4`}>{madeCount}/{madeCount + missedCount} FG ({fgPct}%)</p>
          <div className="relative bg-orange-200 rounded-lg mx-auto" style={{ aspectRatio: '1/1', maxWidth: '400px' }}>
            <svg viewBox="0 0 50 50" className="w-full h-full">
              <rect x="0" y="0" width="50" height="50" fill="#CD853F" stroke="#fff" strokeWidth="0.5"/>
              <rect x="0" y="17" width="19" height="16" fill="none" stroke="#fff" strokeWidth="0.3"/>
              <circle cx="19" cy="25" r="6" fill="none" stroke="#fff" strokeWidth="0.3"/>
              <path d="M 0 3 L 14 3 A 23.75 23.75 0 0 1 14 47 L 0 47" fill="none" stroke="#fff" strokeWidth="0.3"/>
              <path d="M 4 21 A 4 4 0 0 1 4 29" fill="none" stroke="#fff" strokeWidth="0.3"/>
              <circle cx="5.25" cy="25" r="0.75" fill="none" stroke="#fff" strokeWidth="0.3"/>
              <line x1="4" y1="22" x2="4" y2="28" stroke="#fff" strokeWidth="0.5"/>
              <line x1="0" y1="19" x2="19" y2="19" stroke="#fff" strokeWidth="0.2"/>
              <line x1="0" y1="31" x2="19" y2="31" stroke="#fff" strokeWidth="0.2"/>
              {allShots.map((shot, idx) => {
                const cx = shot.x * 0.5;
                const cy = shot.y * 0.5;
                const color = shot.made ? '#22c55e' : '#ef4444';
                return <text key={idx} x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="2.5" fontWeight="bold" stroke="#000" strokeWidth="0.35" paintOrder="stroke fill">{qualityLabel(shot.quality)}</text>;
              })}
            </svg>

          <div className="flex justify-center gap-6 mt-4">

              {['A', 'B', 'C'].map(q => {
                const qShots = allShots.filter(s => qualityLabel(s.quality) === q);
                const qMade = qShots.filter(s => s.made).length;
                const qPct = qShots.length > 0 ? Math.round((qMade / qShots.length) * 100) : 0;
                return (<div key={q}><div className={`font-bold ${q === 'A' ? 'text-green-500' : q === 'B' ? 'text-yellow-500' : 'text-red-500'}`}>Quality {q}</div><div>{qMade}/{qShots.length} ({qPct}%)</div></div>);
              })}
            </div>
          </div>
        </div>
      )}
      {isEndGameView && rotations && rotations.length > 0 && (() => {
        const getTotalPoss = (rot) => (rot.offPoss || 0) + (rot.defPoss || 0);
        const sorted = [...rotations].sort((a, b) => getTotalPoss(b) - getTotalPoss(a));
        const getPlayerName = (idx) => { const p = game.players[idx]; return p ? p.name : `Player ${idx}`; };
        const fgPct = (m, a) => a === 0 ? '-' : `${Math.round((m / a) * 100)}% [${m}/${a}]`;

        const getORate = (rot) => rot.offPoss > 0 ? Math.round(100 * (rot.offPoints || 0) / rot.offPoss) : '-';
        const getDRate = (rot) => rot.defPoss > 0 ? Math.round(100 * (rot.defPoints || 0) / rot.defPoss) : '-';
        const getNetRate = (rot) => {
          if (!rot.offPoss || !rot.defPoss) return '-';

                    <th className="p-2 text-center">DRate</th>

                    <th className="p-2 text-center">PTS+/-</th>
                    <th className="p-2 text-center">REB±</th>
                    <th className="p-2 text-center">TO±</th>
                    <th className="p-2 text-center">FG%</th>
                    <th className="p-2 text-center">Opp FG%</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((rot, idx) => {
                    const rowBg = idx % 2 === 1 ? (darkMode ? 'bg-gray-700/50' : 'bg-gray-50') : '';
                    const netRate = getNetRate(rot);
                    const netRateNum = netRate !== '-' ? parseFloat(netRate) : null;
                    return (
                      <tr key={rot.key} className={`border-b ${theme.border} ${rowBg}`}>
                        <td className="p-2 text-xs">{rot.players.map((pi, i) => (i > 0 ? ' / ' : '') + getPlayerName(pi)).join('')}</td>
                        <td className="p-2 text-center">{getTotalPoss(rot)}</td>
                        <td className="p-2 text-center">{getORate(rot)}</td>
                        <td className="p-2 text-center">{getDRate(rot)}</td>
                        <td className={`p-2 text-center font-bold ${netRateNum !== null ? (netRateNum > 0 ? 'text-green-500' : netRateNum < 0 ? 'text-red-500' : '') : ''}`}>{netRate !== '-' && netRateNum > 0 ? '+' : ''}{netRate}</td>
                        <td className={`p-2 text-center font-bold ${signColor(rot.plusMinus)}`}>{signed(rot.plusMinus)}</td>
                        <td className={`p-2 text-center font-bold ${signColor(rot.rebDiff)}`}>{signed(rot.rebDiff)}</td>
                        <td className={`p-2 text-center font-bold ${signColor(rot.toDiff)}`}>{signed(rot.toDiff)}</td>
                        <td className="p-2 text-center">{fgPct(rot.teamFGMade, rot.teamFGAtt)}</td>
                        <td className="p-2 text-center">{fgPct(rot.oppFGMade, rot.oppFGAtt)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

const ShotChartView = ({ game, viewingShotChart, onBack, onBoxScore, onStatEntry, darkMode, theme, shotChartFilter, setShotChartFilter, showQuality, setShowQuality, isEndGameView, shotChartSource, onGameLog, onMainMenu, onSummary }) => {
  const [showMMConfirm, setShowMMConfirm] = React.useState(false);
  const isIndividual = viewingShotChart.type === 'player';
  const getShots = () => {
    if (viewingShotChart.type === 'team') return game.players.flatMap((p, idx) => (p.shotChart || []).map(shot => ({ ...shot, playerIndex: idx, playerName: `#${p.number} ${p.name}` })));
    const player = game.players[viewingShotChart.playerIndex];
    return (player.shotChart || []).map(shot => ({ ...shot, playerName: `#${player.number} ${player.name}` }));
  };
  const allShots = getShots();
  const filteredShots = allShots.filter(shot => {
    if (shotChartFilter === 'all') return true;
    if (shotChartFilter === 'made') return shot.made;
    if (shotChartFilter === 'missed') return !shot.made;
    return true;
  });
  const playerName = viewingShotChart.type === 'team' ? game.teamName : `#${game.players[viewingShotChart.playerIndex].number} ${game.players[viewingShotChart.playerIndex].name}`;
  const madeCount = allShots.filter(s => s.made).length;
  const missedCount = allShots.filter(s => !s.made).length;
  const fgPct = madeCount + missedCount > 0 ? Math.round((madeCount / (madeCount + missedCount)) * 100) : 0;

  const qualityLabel = (q) => {
    if (q === 'A' || q === 1) return 'A';
    if (q === 'B' || q === 2) return 'B';
    if (q === 'C' || q === 3) return 'C';
    return q;
  };

  return (
    <div className={`min-h-screen ${theme.bg} ${theme.text} p-4 max-w-4xl mx-auto`}>
      <div className="flex gap-1 mb-4 items-center min-w-0">

          {onBoxScore && <button onClick={onBoxScore} className="flex-shrink-0 bg-green-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-green-700 text-xs sm:text-sm whitespace-nowrap">Box Score</button>}
          {!isEndGameView && onStatEntry && <button onClick={onStatEntry} className="flex-shrink-0 bg-blue-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-blue-700 text-xs sm:text-sm whitespace-nowrap">Stat Entry</button>}
          {onGameLog && <button onClick={onGameLog} className="flex-shrink-0 bg-purple-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-purple-700 text-xs sm:text-sm whitespace-nowrap">Game Log</button>}
          {onSummary && <button onClick={onSummary} className="flex-shrink-0 bg-violet-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-violet-700 text-xs sm:text-sm whitespace-nowrap">Summary</button>}
          {onMainMenu && (showMMConfirm ? (
            <div className="flex gap-1 items-center flex-shrink-0">
              <span className={`text-xs font-medium ${theme.text} whitespace-nowrap`}>Main menu?</span>
              <button onClick={() => { setShowMMConfirm(false); onMainMenu(); }} className="bg-gray-700 text-white px-2 py-1 rounded hover:bg-gray-800 text-xs font-bold">Yes</button>
              <button onClick={() => setShowMMConfirm(false)} className="bg-gray-500 text-white px-2 py-1 rounded hover:bg-gray-600 text-xs">No</button>
            </div>
          ) : (
            <button onClick={() => setShowMMConfirm(true)} className="flex-shrink-0 bg-gray-600 text-white px-2 sm:px-3 py-1.5 rounded hover:bg-gray-700 text-xs sm:text-sm whitespace-nowrap">Main Menu</button>
          ))}
        </div>
      </div>
      <div className={`${theme.card} rounded-lg shadow-lg p-4`}>
        <h2 className="text-xl font-bold mb-2">{playerName} Shot Chart</h2>
        <p className={`text-sm ${theme.textMuted} mb-4`}>{madeCount}/{madeCount + missedCount} FG ({fgPct}%)</p>
        {!isIndividual && (
          <div className="flex gap-2 mb-4 flex-wrap items-center">
            <button onClick={() => setShotChartFilter('all')} className={`px-3 py-1 rounded text-sm ${shotChartFilter === 'all' ? 'bg-blue-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>All ({allShots.length})</button>
            <button onClick={() => setShotChartFilter('made')} className={`px-3 py-1 rounded text-sm ${shotChartFilter === 'made' ? 'bg-green-600 text-white' : darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>Made ({madeCount})</button>

        <div className="relative bg-orange-200 rounded-lg" style={{ aspectRatio: '1/1' }}>
          <svg viewBox="0 0 50 50" className="w-full h-full">
            <rect x="0" y="0" width="50" height="50" fill="#CD853F" stroke="#fff" strokeWidth="0.5"/>
            <rect x="0" y="17" width="19" height="16" fill="none" stroke="#fff" strokeWidth="0.3"/>
            <circle cx="19" cy="25" r="6" fill="none" stroke="#fff" strokeWidth="0.3"/>
            <path d="M 0 3 L 14 3 A 23.75 23.75 0 0 1 14 47 L 0 47" fill="none" stroke="#fff" strokeWidth="0.3"/>
            <path d="M 4 21 A 4 4 0 0 1 4 29" fill="none" stroke="#fff" strokeWidth="0.3"/>
            <circle cx="5.25" cy="25" r="0.75" fill="none" stroke="#fff" strokeWidth="0.3"/>
            <line x1="4" y1="22" x2="4" y2="28" stroke="#fff" strokeWidth="0.5"/>
            <line x1="0" y1="19" x2="19" y2="19" stroke="#fff" strokeWidth="0.2"/>
            <line x1="0" y1="31" x2="19" y2="31" stroke="#fff" strokeWidth="0.2"/>
            {filteredShots.map((shot, idx) => {
              const cx = shot.x * 0.5;
              const cy = shot.y * 0.5;
              const color = shot.made ? '#22c55e' : '#ef4444';
              if (isIndividual) {
                return <text key={idx} x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="2.5" fontWeight="bold" stroke="#000" strokeWidth="0.35" paintOrder="stroke fill">{qualityLabel(shot.quality)}</text>;
              }
              if (showQuality) {
                return <text key={idx} x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="2.5" fontWeight="bold" stroke="#000" strokeWidth="0.35" paintOrder="stroke fill">{qualityLabel(shot.quality)}</text>;
              }
              if (shot.made) {
                return <circle key={idx} cx={cx} cy={cy} r="1" fill={color} stroke="#fff" strokeWidth="0.15" opacity="0.9"/>;
              } else {
                return <text key={idx} x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="2" fontWeight="bold" stroke="#fff" strokeWidth="0.1">✕</text>;
              }
            })}
          </svg>
        </div>
        <div className="flex justify-center gap-6 mt-4">
          <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-green-500"></div><span className="text-sm">Made</span></div>
          <div className="flex items-center gap-2"><div className="w-4 h-4 flex items-center justify-center text-red-500 font-bold">✕</div><span className="text-sm">Missed</span></div>
        </div>
        <div className={`mt-4 p-3 rounded ${darkMode ? 'bg-gray-700' : 'bg-gray-100'}`}>
          <h4 className="font-bold mb-2">Shot Quality Breakdown</h4>
          <div className="grid grid-cols-3 gap-4 text-center text-sm">
            {['A', 'B', 'C'].map(q => {
              const qShots = allShots.filter(s => qualityLabel(s.quality) === q);
              const qMade = qShots.filter(s => s.made).length;
              const qPct = qShots.length > 0 ? Math.round((qMade / qShots.length) * 100) : 0;
              return (<div key={q}><div className={`font-bold ${q === 'A' ? 'text-green-500' : q === 'B' ? 'text-yellow-500' : 'text-red-500'}`}>Quality {q}</div><div>{qMade}/{qShots.length} ({qPct}%)</div></div>);
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

const GameLog = ({ log, onBack, darkMode, theme, currentGame, onDeleteStat, onInsertStat, onInsertEndPeriod, insertStatMode, setInsertStatMode, focusedStatIndex, setFocusedStatIndex, currentPeriod }) => {
  const [logFilterPeriod, setLogFilterPeriod] = useState('all');

  const [modalMode, setModalMode] = useState(null); // 'insert_above', 'insert_below', 'edit'
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [selectedPeriod, setSelectedPeriod] = useState(currentPeriod);
  const focusedRef = useRef(null);

  useEffect(() => {
    if (focusedStatIndex !== null && focusedRef.current) {
      focusedRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, [focusedStatIndex]);

  const periods = [];
  for (let i = 1; i <= (currentGame?.maxPeriod || currentPeriod); i++) periods.push(i);

  const filteredLog = logFilterPeriod === 'all' ? log : log.filter(entry => entry.period === parseInt(logFilterPeriod));

  const scrollToPeriod = (period) => {
    setLogFilterPeriod(String(period));

    setSelectedStatIndex(index);

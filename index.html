<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Basketball Stats Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ea580c">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,sans-serif}*{box-sizing:border-box}
    .no-scrollbar::-webkit-scrollbar{display:none}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const storage={async get(k){try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null}catch(e){return null}},async set(k,v){try{localStorage.setItem(k,v);return{key:k,value:v}}catch(e){return null}},async delete(k){try{localStorage.removeItem(k);return{key:k,deleted:true}}catch(e){return null}},async list(p){try{const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(p))keys.push(k)}return{keys}}catch(e){return{keys:[]}}}};

const Plus=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const Eye=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
const ArrowLeft=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
const ArrowUp=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
const ArrowDown=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;
const ChevronsUp=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>;
const ChevronUp=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="18 15 12 9 6 15"/></svg>;
const ChevronDown=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>;
const Undo=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>;
const Trash2=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>;
const X=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const Moon=({size=24,className=''})=><svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>;
const Sun=({size=24,className=''})=><svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
const Edit2=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const Download=({size=24})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

const BasketballStatsApp = () => {
  const [screen, setScreen] = useState('home');
  const [games, setGames] = useState([]);
  const [currentGame, setCurrentGame] = useState(null);
  const [currentPeriod, setCurrentPeriod] = useState(1);
  const [gameLog, setGameLog] = useState([]);
  const [filterPeriod, setFilterPeriod] = useState('Total');
  const [lastStat, setLastStat] = useState(null);
  const [darkMode, setDarkMode] = useState(false);
  const [shotChartPopup, setShotChartPopup] = useState(null);
  const [viewingShotChart, setViewingShotChart] = useState(null);
  const [shotChartSource, setShotChartSource] = useState('boxScore');
  const [shotChartFilter, setShotChartFilter] = useState('all');
  const [showQuality, setShowQuality] = useState(false);
  const [isEndGameView, setIsEndGameView] = useState(false);
  const [playerOrder, setPlayerOrder] = useState([]);
  const [editingStatIndex, setEditingStatIndex] = useState(null);
  const [insertStatMode, setInsertStatMode] = useState(null); // {index, position: 'above'|'below'}
  const [focusedStatIndex, setFocusedStatIndex] = useState(null);
  const [subModal, setSubModal] = useState(null);
  const [onCourtSet, setOnCourtSet] = useState(new Set());
  const [rotations, setRotations] = useState([]);
  const rotationsRef = useRef([]);
  const currentRotationKeyRef = useRef('');
  const currentRotationHasStatRef = useRef(false);
  const possTeamRef = useRef('us'); // 'us' | 'them'
  const possStartRotKeyRef = useRef('');
  const possStartPlayersRef = useRef(new Set());
  const pendingPossRef = useRef(null); // {type:'ftMade'|'fgMiss', forTeam:'us'|'them'}
  const currentPossPointsRef = useRef(0);
  const onCourtSetRef = useRef(new Set());
  const jumpBallArrowRef = useRef(null); // null=uninitialized, 'us'/'them'=who has arrow next
  const offRebPossessionRef = useRef(null); // 'us'|'them'|null — was there an OffReb in this possession
  const techFTActiveRef = useRef(false);
  const [jumpBallPopup, setJumpBallPopup] = useState(null); // {playerIndex, statType}
  const [oppScoreCategoryPopup, setOppScoreCategoryPopup] = useState(null); // {statType}
  const [ftCategoryPopup, setFtCategoryPopup] = useState(null); // {playerIndex}
  const [showEndGameConfirm, setShowEndGameConfirm] = useState(false);
  const [rotationsAutoDownload, setRotationsAutoDownload] = useState(false);
  const [summaryAutoDownload, setSummaryAutoDownload] = useState(false);
  const [rotationsBackScreen, setRotationsBackScreen] = useState('game');
  const [showMainMenuConfirm, setShowMainMenuConfirm] = useState(false);
  const [boxScoreBackScreen, setBoxScoreBackScreen] = useState('home');
  const [summaryBackScreen, setSummaryBackScreen] = useState('game');
  const [gameLogBackScreen, setGameLogBackScreen] = useState('game');
  const [possTeam, setPossTeam] = useState('us');
  const [lineupConfirmModal, setLineupConfirmModal] = useState(null);
  const [statFlow, setStatFlow] = useState(null);

  useEffect(() => {
    const loadGames = async () => {
      try {
        const result = await storage.list('game:');
        if (result && result.keys) {
          const loadedGames = await Promise.all(
            result.keys.map(async (key) => {
              const data = await storage.get(key);
              return data ? JSON.parse(data.value) : null;
            })
          );
          setGames(loadedGames.filter(g => g !== null));
        }
      } catch (error) {
        console.log('No previous games found');
      }
    };
    loadGames();
    const loadDarkMode = async () => {
      try {
        const result = await storage.get('darkMode');
        if (result) setDarkMode(JSON.parse(result.value));
      } catch (e) {}
    };
    loadDarkMode();
  }, []);

  const toggleDarkMode = async () => {
    const newMode = !darkMode;
    setDarkMode(newMode);
    try { await storage.set('darkMode', JSON.stringify(newMode)); } catch (e) {}
  };

  const saveGame = async (game) => {
    await storage.set(`game:${game.id}`, JSON.stringify(game));
  };

  const deleteGame = async (gameId, gameIndex) => {
    await storage.delete(`game:${gameId}`);
    // Remove only the specific instance by index (handles duplicates)
    if (gameIndex !== undefined) {
      setGames(games.filter((_, idx) => idx !== gameIndex));
    } else {
      setGames(games.filter(g => g.id !== gameId));
    }
  };

  const calculateTeamScore = (game) => {
    if (!game || !game.players) return 0;
    return game.players.reduce((total, player) => {
      const stats = player.stats || {};
      return total + (stats['2ptMade'] || 0) * 2 + (stats['3ptMade'] || 0) * 3 + (stats['FTMade'] || 0);
    }, 0);
  };

  const calculateOpponentScore = (game) => {
    if (!game || !game.opponent) return 0;
    const stats = game.opponent.stats || {};
    return (stats['2ptMade'] || 0) * 2 + (stats['3ptMade'] || 0) * 3 + (stats['FTMade'] || 0);
  };

  const calculatePlayerPoints = (player) => {
    const stats = player.stats || {};
    return (stats['2ptMade'] || 0) * 2 + (stats['3ptMade'] || 0) * 3 + (stats['FTMade'] || 0);
  };

  const getPlayerRebounds = (player) => {
    const stats = player.stats || {};
    return (stats['OffReb'] || 0) + (stats['DefReb'] || 0);
  };

  const movePlayerToTop = (playerIdx) => {
    const newOrder = [...playerOrder];
    const currentPos = newOrder.indexOf(playerIdx);
    if (currentPos > 0) {
      newOrder.splice(currentPos, 1);
      newOrder.unshift(playerIdx);
      setPlayerOrder(newOrder);
    }
  };

  const movePlayerUp = (playerIdx) => {
    const newOrder = [...playerOrder];
    const currentPos = newOrder.indexOf(playerIdx);
    if (currentPos > 0) {
      [newOrder[currentPos - 1], newOrder[currentPos]] = [newOrder[currentPos], newOrder[currentPos - 1]];
      setPlayerOrder(newOrder);
    }
  };

  const movePlayerDown = (playerIdx) => {
    const newOrder = [...playerOrder];
    const currentPos = newOrder.indexOf(playerIdx);
    if (currentPos < newOrder.length - 1) {
      [newOrder[currentPos], newOrder[currentPos + 1]] = [newOrder[currentPos + 1], newOrder[currentPos]];
      setPlayerOrder(newOrder);
    }
  };

  const openSubModal = (playerIdx) => {
    const othersInOrder = playerOrder.filter(idx => idx !== playerIdx);
    const top4Others = othersInOrder.slice(0, 4);
    const selections = {};
    currentGame.players.forEach((_, idx) => {
      selections[idx] = idx !== playerIdx && top4Others.includes(idx);
    });
    setSubModal({ triggerPlayerIdx: playerIdx, selections, error: '' });
  };

  const toggleSubSelection = (idx) => {
    setSubModal(prev => ({
      ...prev,
      selections: { ...prev.selections, [idx]: !prev.selections[idx] },
      error: ''
    }));
  };

  const confirmSub = () => {
    const onPlayers = Object.keys(subModal.selections).map(Number).filter(idx => subModal.selections[idx]);
    if (onPlayers.length !== 5) {
      setSubModal(prev => ({ ...prev, error: 'Must have 5 players selected' }));
      return;
    }
    const prevOnCourt = new Set(onCourtSetRef.current);
    const offPlayers = Object.keys(subModal.selections).map(Number).filter(idx => !subModal.selections[idx]);
    const sortedOnPlayers = [...onPlayers].sort((a, b) => {
      const aScore = calculatePlayerPoints(currentGame.players[a]) + getPlayerRebounds(currentGame.players[a]);
      const bScore = calculatePlayerPoints(currentGame.players[b]) + getPlayerRebounds(currentGame.players[b]);
      return bScore - aScore;
    });
    setPlayerOrder([...sortedOnPlayers, ...offPlayers]);
    const newOnCourtSet = new Set(onPlayers);
    setOnCourtSet(newOnCourtSet);
    onCourtSetRef.current = newOnCourtSet;
    const newRotKey = [...onPlayers].sort((a, b) => a - b).join(',');
    // If no stat has been accumulated yet in the current rotation, don't commit a possession —
    // just redirect the possession tracking to the new lineup.
    if (!currentRotationHasStatRef.current) {
      possStartRotKeyRef.current = newRotKey;
      possStartPlayersRef.current = new Set(onPlayers);
    }
    currentRotationKeyRef.current = newRotKey;
    currentRotationHasStatRef.current = false;
    setSubModal(null);
    // Log the substitution
    const comingOn = onPlayers.filter(idx => !prevOnCourt.has(idx));
    const comingOff = [...prevOnCourt].filter(idx => !onPlayers.includes(idx));
    if (comingOn.length > 0 || comingOff.length > 0) {
      const onNames = comingOn.map(i => `#${currentGame.players[i].number} ${currentGame.players[i].name}`).join(', ');
      const offNames = comingOff.map(i => `#${currentGame.players[i].number} ${currentGame.players[i].name}`).join(', ');
      let subText = 'Sub:';
      if (onNames) subText += ` IN: ${onNames}`;
      if (offNames) subText += ` OUT: ${offNames}`;
      setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: -1, statType: 'Sub', text: subText }, ...prev]);
    }
  };

  const toggleLineupConfirmSelection = (idx) => {
    setLineupConfirmModal(prev => ({
      ...prev,
      selections: { ...prev.selections, [idx]: !prev.selections[idx] },
      error: ''
    }));
  };

  const confirmLineupModal = () => {
    const maxOnCourt = Math.min(5, currentGame.players.length);
    const onPlayers = Object.keys(lineupConfirmModal.selections).map(Number).filter(idx => lineupConfirmModal.selections[idx]);
    if (onPlayers.length !== maxOnCourt) {
      setLineupConfirmModal(prev => ({ ...prev, error: `Must select exactly ${maxOnCourt} players` }));
      return;
    }
    const newOnCourtSet = new Set(onPlayers);
    setOnCourtSet(newOnCourtSet);
    onCourtSetRef.current = newOnCourtSet;
    const newRotKey = [...onPlayers].sort((a, b) => a - b).join(',');
    currentRotationKeyRef.current = newRotKey;
    currentRotationHasStatRef.current = false;
    possStartRotKeyRef.current = newRotKey;
    possStartPlayersRef.current = new Set(onPlayers);
    const offPlayers = Object.keys(lineupConfirmModal.selections).map(Number).filter(idx => !lineupConfirmModal.selections[idx]);
    const sortedOnPlayers = [...onPlayers].sort((a, b) => {
      const aScore = calculatePlayerPoints(currentGame.players[a]) + getPlayerRebounds(currentGame.players[a]);
      const bScore = calculatePlayerPoints(currentGame.players[b]) + getPlayerRebounds(currentGame.players[b]);
      return bScore - aScore;
    });
    setPlayerOrder([...sortedOnPlayers, ...offPlayers]);
    if (lineupConfirmModal.isPeriodTransition) {
      const prevOnCourt = lineupConfirmModal.prevOnCourt;
      const comingOn = onPlayers.filter(idx => !prevOnCourt.has(idx));
      const comingOff = [...prevOnCourt].filter(idx => !onPlayers.includes(idx));
      if (comingOn.length > 0 || comingOff.length > 0) {
        const onNames = comingOn.map(i => `#${currentGame.players[i].number} ${currentGame.players[i].name}`).join(', ');
        const offNames = comingOff.map(i => `#${currentGame.players[i].number} ${currentGame.players[i].name}`).join(', ');
        let subText = 'Sub:';
        if (onNames) subText += ` IN: ${onNames}`;
        if (offNames) subText += ` OUT: ${offNames}`;
        setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: -1, statType: 'Sub', text: subText }, ...prev]);
      }
    }
    setLineupConfirmModal(null);
  };

  const startNewGame = (gameInfo) => {
    const newGame = {
      id: Date.now(),
      teamName: gameInfo.teamName,
      opponentName: gameInfo.opponent,
      date: gameInfo.date,
      location: gameInfo.location,
      enableShotChart: gameInfo.enableShotChart,
      numPeriods: gameInfo.numPeriods || 4,
      minutesPerPeriod: gameInfo.minutesPerPeriod || 10,
      players: gameInfo.players.map(p => ({
        ...p,
        stats: { '2ptMade': 0, '2ptMiss': 0, '3ptMade': 0, '3ptMiss': 0, 'FTMade': 0, 'FTMiss': 0, 'OffReb': 0, 'DefReb': 0, 'Ast': 0, 'Stl': 0, 'Blk': 0, 'LiveTO': 0, 'DeadTO': 0, 'Foul': 0, 'ForceJB': 0, 'ConcedeJB': 0, 'plusMinus': 0, 'poss': 0 },
        periodStats: {},
        shotChart: []
      })),
      opponent: {
        stats: { '2ptMade': 0, '2ptMiss': 0, '3ptMade': 0, '3ptMiss': 0, 'FTMade': 0, 'FTMiss': 0, 'OffReb': 0, 'DefReb': 0, 'Ast': 0, 'Stl': 0, 'Blk': 0, 'LiveTO': 0, 'DeadTO': 0, 'Foul': 0, 'ForceJB': 0, 'ConcedeJB': 0 },
        periodStats: {}
      },
      maxPeriod: 1
    };
    setCurrentGame(newGame);
    setCurrentPeriod(1);
    setGameLog([]);
    setLastStat(null);
    setIsEndGameView(false);
    setPlayerOrder(gameInfo.players.map((_, idx) => idx));
    const initialOnCourt = new Set(gameInfo.players.slice(0, Math.min(5, gameInfo.players.length)).map((_, idx) => idx));
    setOnCourtSet(initialOnCourt);
    rotationsRef.current = [];
    setRotations([]);
    const initRotKey = [...initialOnCourt].sort((a, b) => a - b).join(',');
    currentRotationKeyRef.current = initRotKey;
    currentRotationHasStatRef.current = false;
    onCourtSetRef.current = initialOnCourt;
    possTeamRef.current = 'us';
    setPossTeam('us');
    possStartRotKeyRef.current = initRotKey;
    possStartPlayersRef.current = new Set(initialOnCourt);
    pendingPossRef.current = null;
    currentPossPointsRef.current = 0;
    jumpBallArrowRef.current = null;
    offRebPossessionRef.current = null;
    setScreen('game');
    const initialSelections = {};
    gameInfo.players.forEach((_, idx) => {
      initialSelections[idx] = idx < Math.min(5, gameInfo.players.length);
    });
    setLineupConfirmModal({ selections: initialSelections, isPeriodTransition: false, prevOnCourt: new Set(), title: 'Set Starting Lineup' });
  };

  const handleFieldGoalClick = (playerIndex, statType) => {
    if (playerIndex === 'opponent') {
      if (statType === '2ptMade' || statType === '3ptMade') {
        handleOpponentScore(statType);
      } else {
        recordStat(playerIndex, statType);
      }
      return;
    }
    if (!currentGame.enableShotChart) {
      recordStat(playerIndex, statType);
      return;
    }
    const is2ndChance = offRebPossessionRef.current === 'us';
    setShotChartPopup({ playerIndex, statType, step: 'location', x: null, y: null, is2ndChance });
  };

  const handleCourtClick = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    setShotChartPopup(prev => ({ ...prev, x, y, step: 'quality' }));
  };

  const handleCourtRelocation = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    setShotChartPopup(prev => ({ ...prev, x, y }));
  };

  const handleQualitySelect = (quality, category) => {
    const { playerIndex, statType, x, y } = shotChartPopup;
    const isMade = statType.includes('Made');
    const updatedGame = { ...currentGame };
    const player = updatedGame.players[playerIndex];
    player.shotChart = player.shotChart || [];
    player.shotChart.push({ x, y, made: isMade, is3pt: statType.includes('3pt'), quality, category, period: currentPeriod, time: Date.now() });
    setCurrentGame(updatedGame);
    setShotChartPopup(null);
    recordStat(playerIndex, statType, updatedGame, { scoreCategory: category });
  };

  const handleJumpBallClick = (playerIndex, statType) => {
    if (jumpBallArrowRef.current === null) {
      setJumpBallPopup({ playerIndex, statType });
    } else {
      const possTeam = jumpBallArrowRef.current;
      jumpBallArrowRef.current = possTeam === 'us' ? 'them' : 'us';
      recordStat(playerIndex, statType, null, { jbPossTeam: possTeam });
    }
  };

  const confirmJumpBall = (possTeam) => {
    const { playerIndex, statType } = jumpBallPopup;
    jumpBallArrowRef.current = possTeam === 'us' ? 'them' : 'us';
    setJumpBallPopup(null);
    recordStat(playerIndex, statType, null, { jbPossTeam: possTeam });
  };

  const handleOpponentScore = (statType) => {
    const is2ndChance = offRebPossessionRef.current === 'them';
    if (is2ndChance) {
      recordStat('opponent', statType, null, { scoreCategory: '2ndChance' });
    } else {
      setOppScoreCategoryPopup({ statType });
    }
  };

  const confirmOppScoreCategory = (category) => {
    const { statType } = oppScoreCategoryPopup;
    setOppScoreCategoryPopup(null);
    recordStat('opponent', statType, null, { scoreCategory: category });
  };

  const handleFTMade = (playerIndex) => {
    setFtCategoryPopup({ playerIndex });
  };

  const confirmFTCategory = (category) => {
    const { playerIndex } = ftCategoryPopup;
    setFtCategoryPopup(null);
    if (category === 'Technical') {
      recordStat(playerIndex, 'FTMade', null, { scoreCategory: 'Technical', skipPossession: true });
      return;
    }
    recordStat(playerIndex, 'FTMade', null, { scoreCategory: category });
  };

  const openTeamSubModal = () => {
    const selections = {};
    currentGame.players.forEach((_, idx) => {
      selections[idx] = onCourtSetRef.current.has(idx);
    });
    setSubModal({ triggerPlayerIdx: null, selections, error: '' });
  };

  const cancelFlow = () => setStatFlow(null);

  const advanceFlow = (updates) => setStatFlow(prev => ({ ...prev, ...updates }));

  const recordTimeout = (team) => {
    const teamName = team === 'us' ? currentGame.teamName : (currentGame.opponentName || 'Opponent');
    const text = `Timeout — ${teamName}`;
    setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'timeout', text }, ...prev]);
    setLastStat({ text });
  };

  const startOurShotFlow = (stat) => {
    const suggestedContext = offRebPossessionRef.current === 'us' ? '2ndChance' : null;
    if (currentGame.enableShotChart) {
      setStatFlow({ stat, step: 'shotLoc', data: { suggestedContext } });
    } else {
      setStatFlow({ stat, step: 'context', data: { suggestedContext } });
    }
  };

  const startFTFlow = () => {
    const suggestedContext = offRebPossessionRef.current === 'us' ? '2ndChance' : null;
    setStatFlow({ stat: 'FT', step: 'byWho', data: { suggestedContext } });
  };

  const startSimpleFlow = (stat) => {
    setStatFlow({ stat, step: 'byWho', data: {} });
  };

  const startOppShotFlow = (stat) => {
    const suggestedContext = offRebPossessionRef.current === 'them' ? '2ndChance' : null;
    if (stat === 'opp2X' || stat === 'opp3X') {
      setStatFlow({ stat, step: 'oppOutcome', data: { suggestedContext, context: null } });
    } else {
      setStatFlow({ stat, step: 'oppContext', data: { suggestedContext } });
    }
  };

  const startOppFTFlow = () => {
    setStatFlow({ stat: 'oppFT', step: 'oppFTDetails', data: { ftCount: 2, s1: undefined, s2: undefined, context: 'HalfCourt' } });
  };

  const completeStatFlow = (flow) => {
    const { stat, data } = flow;
    setStatFlow(null);

    if (stat === '2ptMade' || stat === '3ptMade') {
      const { playerIndex, context, shotX, shotY, shotQuality, assistPlayerIndex } = data;
      if (playerIndex === 'unknown') { recordStat('unknown', stat); return; }
      let baseGame = null;
      if (currentGame.enableShotChart && shotX !== undefined) {
        const updG = { ...currentGame };
        const pl = updG.players[playerIndex];
        pl.shotChart = pl.shotChart || [];
        pl.shotChart.push({ x: shotX, y: shotY, made: true, is3pt: stat === '3ptMade', quality: shotQuality, category: context, period: currentPeriod, time: Date.now() });
        setCurrentGame(updG);
        baseGame = updG;
      }
      const g = recordStat(playerIndex, stat, baseGame, { scoreCategory: context });
      if (assistPlayerIndex != null) recordStat(assistPlayerIndex, 'Ast', g);
      return;
    }

    if (stat === '2ptMiss' || stat === '3ptMiss') {
      const { playerIndex, context, shotX, shotY, shotQuality, outcome, rebPlayerIndex } = data;
      if (playerIndex === 'unknown') { recordStat('unknown', stat); return; }
      let baseGame = null;
      if (currentGame.enableShotChart && shotX !== undefined) {
        const updG = { ...currentGame };
        const pl = updG.players[playerIndex];
        pl.shotChart = pl.shotChart || [];
        pl.shotChart.push({ x: shotX, y: shotY, made: false, is3pt: stat === '3ptMiss', quality: shotQuality, category: context, period: currentPeriod, time: Date.now() });
        setCurrentGame(updG);
        baseGame = updG;
      }
      const g = recordStat(playerIndex, stat, baseGame, { scoreCategory: context });
      if (outcome === 'rebUs' && rebPlayerIndex != null) {
        recordStat(rebPlayerIndex === 'unknown' ? 'unknown' : rebPlayerIndex, 'OffReb', g);
      } else if (outcome === 'rebThem') {
        recordStat('opponent', 'DefReb', g);
      } else if (outcome === 'oobUs' || outcome === 'oobThem') {
        const teamGetsOOB = outcome === 'oobUs' ? 'us' : 'them';
        commitPossession(g);
        setCurrentGame(g);
        startPossession(teamGetsOOB);
        const oobTeamName = teamGetsOOB === 'us' ? currentGame.teamName : (currentGame.opponentName || 'Opponent');
        setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'oob', text: `OOB — ${oobTeamName} ball` }, ...prev]);
      }
      return;
    }

    if (stat === 'FT') {
      const { playerIndex, ftCount = 2, s1, s2, s3, context = 'HalfCourt' } = data;
      if (playerIndex === 'unknown') { recordStat('unknown', 'FTMade'); return; }
      const cat = context === 'Technical' ? 'Technical' : context;
      const m1 = s1 !== false, m2 = s2 !== false, m3 = s3 !== false;
      let g = null;
      if (ftCount >= 1) g = recordStat(playerIndex, m1 ? 'FTMade' : 'FTMiss', g, { scoreCategory: cat, skipPossession: ftCount > 1 || cat === 'Technical' });
      if (ftCount >= 2) g = recordStat(playerIndex, m2 ? 'FTMade' : 'FTMiss', g, { scoreCategory: cat, skipPossession: ftCount > 2 || cat === 'Technical' });
      if (ftCount >= 3) g = recordStat(playerIndex, m3 ? 'FTMade' : 'FTMiss', g, { scoreCategory: cat, skipPossession: cat === 'Technical' });
      const lastMiss = (ftCount === 1 && !m1) || (ftCount === 2 && !m2) || (ftCount === 3 && !m3);
      if (lastMiss && cat !== 'Technical') {
        setStatFlow({ stat: 'ftMissRebound', step: 'outcome', data: {} });
      }
      return;
    }

    if (stat === 'opp2M' || stat === 'opp3M') {
      const { context } = data;
      recordStat('opponent', stat === 'opp2M' ? '2ptMade' : '3ptMade', null, { scoreCategory: context });
      return;
    }

    if (stat === 'opp2X' || stat === 'opp3X') {
      const { context, outcome, rebPlayerIndex, blockPlayerIndex } = data;
      let g = recordStat('opponent', stat === 'opp2X' ? '2ptMiss' : '3ptMiss', null, { scoreCategory: context });
      if (blockPlayerIndex != null) g = recordStat(blockPlayerIndex === 'unknown' ? 'unknown' : blockPlayerIndex, 'Blk', g);
      if (outcome === 'rebUs' && rebPlayerIndex != null) {
        recordStat(rebPlayerIndex === 'unknown' ? 'unknown' : rebPlayerIndex, 'DefReb', g);
      } else if (outcome === 'rebThem') {
        recordStat('opponent', 'OffReb', g);
      } else if (outcome === 'oobUs' || outcome === 'oobThem') {
        const teamGetsOOB = outcome === 'oobUs' ? 'us' : 'them';
        commitPossession(g);
        setCurrentGame(g);
        startPossession(teamGetsOOB);
        const oobTeamName = teamGetsOOB === 'us' ? currentGame.teamName : (currentGame.opponentName || 'Opponent');
        setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'oob', text: `OOB — ${oobTeamName} ball` }, ...prev]);
      }
      return;
    }

    if (stat === 'oppFT') {
      const { ftCount = 2, s1, s2, s3, context = 'HalfCourt' } = data;
      const cat = context === 'Technical' ? 'Technical' : context;
      const m1 = s1 !== false, m2 = s2 !== false, m3 = s3 !== false;
      let g = null;
      if (ftCount >= 1) g = recordStat('opponent', m1 ? 'FTMade' : 'FTMiss', g, { scoreCategory: cat, skipPossession: ftCount > 1 || cat === 'Technical' });
      if (ftCount >= 2) g = recordStat('opponent', m2 ? 'FTMade' : 'FTMiss', g, { scoreCategory: cat, skipPossession: ftCount > 2 || cat === 'Technical' });
      if (ftCount >= 3) g = recordStat('opponent', m3 ? 'FTMade' : 'FTMiss', g, { scoreCategory: cat, skipPossession: cat === 'Technical' });
      const lastMiss = (ftCount === 1 && !m1) || (ftCount === 2 && !m2) || (ftCount === 3 && !m3);
      if (lastMiss && cat !== 'Technical') {
        setStatFlow({ stat: 'oppFTMissRebound', step: 'oppFTMissRebound', data: {} });
      }
      return;
    }

    if (stat === 'oppFTMissRebound') {
      const { outcome, rebPlayerIndex } = data;
      if (outcome === 'rebUs' && rebPlayerIndex != null) {
        recordStat(rebPlayerIndex === 'unknown' ? 'unknown' : rebPlayerIndex, 'DefReb');
      } else if (outcome === 'rebThem') {
        recordStat('opponent', 'OffReb');
      } else if (outcome === 'oobUs' || outcome === 'oobThem') {
        const teamGetsOOB = outcome === 'oobUs' ? 'us' : 'them';
        commitPossession(null);
        startPossession(teamGetsOOB);
        pendingPossRef.current = null;
        const oobTeamName = teamGetsOOB === 'us' ? currentGame.teamName : (currentGame.opponentName || 'Opponent');
        setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'oob', text: `OOB — ${oobTeamName} ball` }, ...prev]);
      }
      return;
    }

    if (stat === 'ftMissRebound') {
      const { outcome, rebPlayerIndex } = data;
      if (outcome === 'rebUs' && rebPlayerIndex != null) {
        recordStat(rebPlayerIndex === 'unknown' ? 'unknown' : rebPlayerIndex, 'OffReb');
      } else if (outcome === 'rebThem') {
        recordStat('opponent', 'DefReb');
      } else if (outcome === 'oobUs' || outcome === 'oobThem') {
        const teamGetsOOB = outcome === 'oobUs' ? 'us' : 'them';
        commitPossession(null);
        startPossession(teamGetsOOB);
        pendingPossRef.current = null;
        const oobTeamName = teamGetsOOB === 'us' ? currentGame.teamName : (currentGame.opponentName || 'Opponent');
        setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'oob', text: `OOB — ${oobTeamName} ball` }, ...prev]);
      }
      return;
    }

    // Simple stats: Foul, LiveTO, DeadTO, Stl, Blk, OffReb, DefReb, ForceJB, ConcedeJB
    const { playerIndex } = data;
    if (stat === 'ForceJB' || stat === 'ConcedeJB') {
      if (playerIndex === 'unknown') recordStat('unknown', stat);
      else handleJumpBallClick(playerIndex, stat);
    } else {
      recordStat(playerIndex, stat);
    }
  };

  const commitPossession = (updatedGame) => {
    const rotKey = possStartRotKeyRef.current;
    if (!rotKey) return;
    const isOurPoss = possTeamRef.current === 'us';
    const pts = currentPossPointsRef.current;
    const updRots = [...rotationsRef.current];
    let ri = updRots.findIndex(r => r.key === rotKey);
    if (ri === -1) {
      updRots.push({ key: rotKey, players: rotKey.split(',').map(Number), count: 0, plusMinus: 0, rebDiff: 0, toDiff: 0, teamFGMade: 0, teamFGAtt: 0, oppFGMade: 0, oppFGAtt: 0, offPoss: 0, defPoss: 0, offPoints: 0, defPoints: 0 });
      ri = updRots.length - 1;
    }
    const rot = { ...updRots[ri] };
    if (isOurPoss) { rot.offPoss = (rot.offPoss || 0) + 1; rot.offPoints = (rot.offPoints || 0) + pts; }
    else { rot.defPoss = (rot.defPoss || 0) + 1; rot.defPoints = (rot.defPoints || 0) + pts; }
    updRots[ri] = rot;
    rotationsRef.current = updRots;
    setRotations(updRots);
    possStartPlayersRef.current.forEach(idx => {
      if (updatedGame.players[idx]) updatedGame.players[idx].stats.poss = (updatedGame.players[idx].stats.poss || 0) + 1;
    });
  };

  const startPossession = (team) => {
    possTeamRef.current = team;
    setPossTeam(team);
    possStartRotKeyRef.current = currentRotationKeyRef.current;
    possStartPlayersRef.current = new Set(onCourtSetRef.current);
    currentPossPointsRef.current = 0;
    offRebPossessionRef.current = null;
  };

  const processPossession = (isOpponent, statType, updatedGame, skipPossession = false) => {
    if (skipPossession) {
      if (statType === 'FTMade') currentPossPointsRef.current += 1;
      return;
    }
    const currentTeam = isOpponent ? 'them' : 'us';
    const pending = pendingPossRef.current;
    let pendingResolved = false;

    if (pending) {
      if (pending.type === 'ftMade') {
        if (statType !== 'FTMade' && statType !== 'FTMiss') {
          commitPossession(updatedGame);
          pendingPossRef.current = null;
          startPossession(pending.forTeam === 'us' ? 'them' : 'us');
          pendingResolved = true;
        }
      } else if (pending.type === 'fgMiss') {
        if (statType === 'OffReb' && currentTeam === pending.forTeam) {
          pendingPossRef.current = null;
          return;
        } else if (currentTeam !== pending.forTeam) {
          commitPossession(updatedGame);
          pendingPossRef.current = null;
          startPossession(currentTeam);
          pendingResolved = true;
        } else {
          pendingPossRef.current = null;
        }
      }
    }

    if (pendingResolved) {
      if (statType === 'FTMade') { currentPossPointsRef.current += 1; pendingPossRef.current = { type: 'ftMade', forTeam: currentTeam }; }
      else if (statType === '2ptMade' || statType === '3ptMade') { currentPossPointsRef.current += statType === '2ptMade' ? 2 : 3; commitPossession(updatedGame); startPossession(currentTeam === 'us' ? 'them' : 'us'); }
      else if (statType === '2ptMiss' || statType === '3ptMiss' || statType === 'FTMiss') { pendingPossRef.current = { type: 'fgMiss', forTeam: currentTeam }; }
      else if (statType === 'LiveTO' || statType === 'DeadTO') { commitPossession(updatedGame); startPossession(currentTeam === 'us' ? 'them' : 'us'); }
    } else {
      if (statType === '2ptMade' || statType === '3ptMade') { currentPossPointsRef.current += statType === '2ptMade' ? 2 : 3; commitPossession(updatedGame); startPossession(currentTeam === 'us' ? 'them' : 'us'); }
      else if (statType === 'FTMade') { currentPossPointsRef.current += 1; pendingPossRef.current = { type: 'ftMade', forTeam: currentTeam }; }
      else if (statType === 'FTMiss') { pendingPossRef.current = { type: 'fgMiss', forTeam: currentTeam }; }
      else if (statType === 'LiveTO' || statType === 'DeadTO') { commitPossession(updatedGame); startPossession(currentTeam === 'us' ? 'them' : 'us'); }
      else if (statType === 'DefReb') { commitPossession(updatedGame); startPossession(currentTeam); }
      else if (statType === '2ptMiss' || statType === '3ptMiss') { pendingPossRef.current = { type: 'fgMiss', forTeam: currentTeam }; }
      else if (statType === 'Stl') { commitPossession(updatedGame); startPossession('us'); }
      else if (statType === 'ForceJB' || statType === 'ConcedeJB') { commitPossession(updatedGame); startPossession(possTeamRef.current); }
    }
  };

  const recordStat = (playerIndex, statType, gameOverride = null, extras = {}) => {
    if (playerIndex === 'unknown') {
      const uL = { '2ptMade': '2PT Made', '2ptMiss': '2PT Miss', '3ptMade': '3PT Made', '3ptMiss': '3PT Miss', 'FTMade': 'FT Made', 'FTMiss': 'FT Miss', 'OffReb': 'Off Reb', 'DefReb': 'Def Reb', 'Ast': 'Assist', 'Stl': 'Steal', 'Blk': 'Block', 'LiveTO': 'Live TO', 'DeadTO': 'Dead TO', 'Foul': 'Foul', 'ForceJB': 'Force JB', 'ConcedeJB': 'Concede JB' };
      const uText = `Unknown — ${uL[statType] || statType}`;
      setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: 'unknown', statType, text: uText }, ...prev]);
      setLastStat({ text: uText });
      return null;
    }
    let updatedGame = gameOverride ? { ...gameOverride } : { ...currentGame };
    const isOpponent = playerIndex === 'opponent';
    const player = isOpponent ? updatedGame.opponent : updatedGame.players[playerIndex];

    // Auto offensive rebound: if same TEAM had a FG miss immediately before this FG attempt
    let autoOffReb = false;
    if (statType === '2ptMade' || statType === '2ptMiss' || statType === '3ptMade' || statType === '3ptMiss') {
      if (gameLog.length > 0) {
        const lastEntry = gameLog[0];
        const lastWasTeamMiss = isOpponent
          ? (lastEntry.playerIndex === 'opponent' && (lastEntry.statType === '2ptMiss' || lastEntry.statType === '3ptMiss'))
          : (lastEntry.playerIndex !== 'opponent' && (lastEntry.statType === '2ptMiss' || lastEntry.statType === '3ptMiss'));

        if (lastWasTeamMiss) {
          autoOffReb = true;
          player.stats['OffReb'] = (player.stats['OffReb'] || 0) + 1;
          if (!player.periodStats[currentPeriod]) player.periodStats[currentPeriod] = {};
          player.periodStats[currentPeriod]['OffReb'] = (player.periodStats[currentPeriod]['OffReb'] || 0) + 1;
        }
      }
    }

    player.stats[statType] = (player.stats[statType] || 0) + 1;
    if (!player.periodStats[currentPeriod]) player.periodStats[currentPeriod] = {};
    player.periodStats[currentPeriod][statType] = (player.periodStats[currentPeriod][statType] || 0) + 1;
    if (currentPeriod > updatedGame.maxPeriod) updatedGame.maxPeriod = currentPeriod;

    const statLabel = { '2ptMade': '2PT Made', '2ptMiss': '2PT Miss', '3ptMade': '3PT Made', '3ptMiss': '3PT Miss', 'FTMade': 'FT Made', 'FTMiss': 'FT Miss', 'OffReb': 'Off Reb', 'DefReb': 'Def Reb', 'Ast': 'Assist', 'Stl': 'Steal', 'Blk': 'Block', 'LiveTO': 'Live TO', 'DeadTO': 'Dead TO', 'Foul': 'Foul', 'ForceJB': 'Force JB', 'ConcedeJB': 'Concede JB' };
    const playerName = isOpponent ? 'Opponent' : `#${player.number} ${player.name}`;

    let displayText = '';
    if (statType === '2ptMade' || statType === '3ptMade' || statType === 'FTMade') {
      const newTeamScore = calculateTeamScore(updatedGame);
      const newOppScore = calculateOpponentScore(updatedGame);
      displayText = `${playerName} - ${statLabel[statType]} (${calculatePlayerPoints(player)} pts) | ${updatedGame.teamName} ${newTeamScore}-${newOppScore} ${updatedGame.opponentName || 'Opponent'}`;
    } else if (statType === '2ptMiss' || statType === '3ptMiss') {
      const fgMade = (player.stats['2ptMade'] || 0) + (player.stats['3ptMade'] || 0);
      const fgMiss = (player.stats['2ptMiss'] || 0) + (player.stats['3ptMiss'] || 0);
      const fgPct = fgMade + fgMiss > 0 ? Math.round((fgMade / (fgMade + fgMiss)) * 100) : 0;
      displayText = `${playerName} - ${statLabel[statType]} (${fgMade}/${fgMade + fgMiss}, ${fgPct}%)`;
    } else if (statType === 'FTMiss') {
      const ftMade = player.stats['FTMade'] || 0;
      const ftMiss = player.stats['FTMiss'] || 0;
      const ftPct = ftMade + ftMiss > 0 ? Math.round((ftMade / (ftMade + ftMiss)) * 100) : 0;
      displayText = `${playerName} - ${statLabel[statType]} (${ftMade}/${ftMade + ftMiss}, ${ftPct}%)`;
    } else {
      displayText = `${playerName} - ${statLabel[statType]} (${player.stats[statType]})`;
    }
    // Append JB possession info
    if ((statType === 'ForceJB' || statType === 'ConcedeJB') && extras.jbPossTeam !== undefined) {
      const possName = extras.jbPossTeam === 'us' ? updatedGame.teamName : (updatedGame.opponentName || 'Opponent');
      displayText += ` - Possession to ${possName}`;
    }

    // +/- tracking: update all on-court players for scoring plays
    let pmDelta = 0;
    if (statType === '2ptMade') pmDelta = isOpponent ? -2 : 2;
    else if (statType === '3ptMade') pmDelta = isOpponent ? -3 : 3;
    else if (statType === 'FTMade') pmDelta = isOpponent ? -1 : 1;
    const pmPlayers = pmDelta !== 0 ? [...onCourtSet] : [];
    if (pmDelta !== 0) {
      pmPlayers.forEach(idx => {
        updatedGame.players[idx].stats['plusMinus'] = (updatedGame.players[idx].stats['plusMinus'] || 0) + pmDelta;
      });
    }

    const logEntriesToAdd = [];
    if (autoOffReb) {
      const orebText = `${playerName} - Off Reb (${player.stats['OffReb']}) [auto]`;
      logEntriesToAdd.push({ time: Date.now() - 1, period: currentPeriod, playerIndex, statType: 'OffReb', text: orebText, auto: true });
    }
    // Rotation tracking
    const rotKey = currentRotationKeyRef.current;
    let rotDeltas = null;
    let rotTriggeredCount = false;
    if (rotKey) {
      let rPm = pmDelta;
      let rReb = 0, rTo = 0, rTFGM = 0, rTFGA = 0, rOFGM = 0, rOFGA = 0;
      if (!isOpponent) {
        if (statType === '2ptMade' || statType === '3ptMade') { rTFGM = 1; rTFGA = 1; }
        else if (statType === '2ptMiss' || statType === '3ptMiss') { rTFGA = 1; }
        else if (statType === 'OffReb' || statType === 'DefReb') { rReb = 1; }
        else if (statType === 'LiveTO' || statType === 'DeadTO') { rTo = -1; }
      } else {
        if (statType === '2ptMade' || statType === '3ptMade') { rOFGM = 1; rOFGA = 1; }
        else if (statType === '2ptMiss' || statType === '3ptMiss') { rOFGA = 1; }
        else if (statType === 'OffReb' || statType === 'DefReb') { rReb = -1; }
        else if (statType === 'LiveTO' || statType === 'DeadTO') { rTo = 1; }
      }
      const hasAnyDelta = rPm !== 0 || rReb !== 0 || rTo !== 0 || rTFGM !== 0 || rTFGA !== 0 || rOFGM !== 0 || rOFGA !== 0;
      if (hasAnyDelta) {
        const updRots = [...rotationsRef.current];
        let ri = updRots.findIndex(r => r.key === rotKey);
        if (ri === -1) {
          updRots.push({ key: rotKey, players: rotKey.split(',').map(Number), count: 0, plusMinus: 0, rebDiff: 0, toDiff: 0, teamFGMade: 0, teamFGAtt: 0, oppFGMade: 0, oppFGAtt: 0, offPoss: 0, defPoss: 0, offPoints: 0, defPoints: 0 });
          ri = updRots.length - 1;
        }
        if (!currentRotationHasStatRef.current) {
          updRots[ri] = { ...updRots[ri], count: updRots[ri].count + 1 };
          currentRotationHasStatRef.current = true;
          rotTriggeredCount = true;
        }
        updRots[ri] = { ...updRots[ri], plusMinus: updRots[ri].plusMinus + rPm, rebDiff: updRots[ri].rebDiff + rReb, toDiff: updRots[ri].toDiff + rTo, teamFGMade: updRots[ri].teamFGMade + rTFGM, teamFGAtt: updRots[ri].teamFGAtt + rTFGA, oppFGMade: updRots[ri].oppFGMade + rOFGM, oppFGAtt: updRots[ri].oppFGAtt + rOFGA };
        rotationsRef.current = updRots;
        setRotations(updRots);
        rotDeltas = { rPm, rReb, rTo, rTFGM, rTFGA, rOFGM, rOFGA };
      }
    }

    const mainEntry = { time: Date.now(), period: currentPeriod, playerIndex, statType, text: displayText };
    if (pmDelta !== 0) { mainEntry.pmDelta = pmDelta; mainEntry.pmPlayers = pmPlayers; }
    if (rotDeltas) { mainEntry.rotKey = rotKey; mainEntry.rotDeltas = rotDeltas; if (rotTriggeredCount) mainEntry.rotTriggeredCount = true; }
    logEntriesToAdd.push(mainEntry);

    setGameLog(prev => [...logEntriesToAdd, ...prev]);
    setLastStat({ text: displayText });

    // Auto-reciprocal: our player Steal → opponent Live TO
    if (!isOpponent && statType === 'Stl') {
      updatedGame.opponent.stats['LiveTO'] = (updatedGame.opponent.stats['LiveTO'] || 0) + 1;
      if (!updatedGame.opponent.periodStats[currentPeriod]) updatedGame.opponent.periodStats[currentPeriod] = {};
      updatedGame.opponent.periodStats[currentPeriod]['LiveTO'] = (updatedGame.opponent.periodStats[currentPeriod]['LiveTO'] || 0) + 1;
    }
    // Auto-reciprocal: our player Live TO → opponent Steal
    if (!isOpponent && statType === 'LiveTO') {
      updatedGame.opponent.stats['Stl'] = (updatedGame.opponent.stats['Stl'] || 0) + 1;
      if (!updatedGame.opponent.periodStats[currentPeriod]) updatedGame.opponent.periodStats[currentPeriod] = {};
      updatedGame.opponent.periodStats[currentPeriod]['Stl'] = (updatedGame.opponent.periodStats[currentPeriod]['Stl'] || 0) + 1;
    }

    // Track offensive rebound for 2nd chance category detection (set before processPossession)
    if (statType === 'OffReb' || autoOffReb) offRebPossessionRef.current = isOpponent ? 'them' : 'us';

    // Store opponent score categories
    if (isOpponent && extras.scoreCategory && (statType === '2ptMade' || statType === '3ptMade' || statType === 'FTMade')) {
      const pts = statType === '2ptMade' ? 2 : statType === '3ptMade' ? 3 : 1;
      if (!updatedGame.opponent.periodStats[currentPeriod]) updatedGame.opponent.periodStats[currentPeriod] = {};
      if (extras.scoreCategory === 'Transition') {
        updatedGame.opponent.stats.transPts = (updatedGame.opponent.stats.transPts || 0) + pts;
        updatedGame.opponent.periodStats[currentPeriod].transPts = (updatedGame.opponent.periodStats[currentPeriod].transPts || 0) + pts;
      } else if (extras.scoreCategory === 'HalfCourt') {
        updatedGame.opponent.stats.halfCourtPts = (updatedGame.opponent.stats.halfCourtPts || 0) + pts;
        updatedGame.opponent.periodStats[currentPeriod].halfCourtPts = (updatedGame.opponent.periodStats[currentPeriod].halfCourtPts || 0) + pts;
      } else if (extras.scoreCategory === '2ndChance') {
        updatedGame.opponent.stats.secChancePts = (updatedGame.opponent.stats.secChancePts || 0) + pts;
        updatedGame.opponent.periodStats[currentPeriod].secChancePts = (updatedGame.opponent.periodStats[currentPeriod].secChancePts || 0) + pts;
      }
    }
    // Store player FT categories
    if (!isOpponent && statType === 'FTMade' && extras.scoreCategory) {
      const ftKey = extras.scoreCategory === 'Transition' ? 'FTMade_T' : extras.scoreCategory === 'HalfCourt' ? 'FTMade_H' : extras.scoreCategory === 'Technical' ? 'FTMade_Tech' : 'FTMade_2C';
      player.stats[ftKey] = (player.stats[ftKey] || 0) + 1;
      if (!player.periodStats[currentPeriod]) player.periodStats[currentPeriod] = {};
      player.periodStats[currentPeriod][ftKey] = (player.periodStats[currentPeriod][ftKey] || 0) + 1;
    }

    processPossession(isOpponent, statType, updatedGame, extras.skipPossession || false);
    setCurrentGame(updatedGame);
    return updatedGame;
  };

  const undoLastStat = () => {
    if (gameLog.length === 0) return;
    const lastEntry = gameLog[0];

    if (lastEntry.statType === 'endPeriod') {
      const newLog = gameLog.slice(1);
      setGameLog(newLog);
      setCurrentPeriod(lastEntry.period);
      setLastStat(newLog.length > 0 ? { text: newLog[0].text } : null);
      return;
    }

    if (lastEntry.statType === 'possChange') {
      const newLog = gameLog.slice(1);
      setGameLog(newLog);
      setLastStat(newLog.length > 0 ? { text: newLog[0].text } : null);
      return;
    }
    if (lastEntry.playerIndex === 'unknown' || lastEntry.playerIndex === null ||
        lastEntry.playerIndex === -1 || lastEntry.statType === 'oob' ||
        lastEntry.statType === 'timeout' || lastEntry.statType === 'Sub') {
      const newLog = gameLog.slice(1);
      setGameLog(newLog);
      setLastStat(newLog.length > 0 ? { text: newLog[0].text } : null);
      return;
    }

    const updatedGame = { ...currentGame };
    const isOpponent = lastEntry.playerIndex === 'opponent';
    const player = isOpponent ? updatedGame.opponent : updatedGame.players[lastEntry.playerIndex];
    if (player.stats[lastEntry.statType] > 0) player.stats[lastEntry.statType]--;
    const logPeriod = lastEntry.period;
    if (player.periodStats[logPeriod] && player.periodStats[logPeriod][lastEntry.statType] > 0) {
      player.periodStats[logPeriod][lastEntry.statType]--;
    }
    if (lastEntry.pmDelta && lastEntry.pmPlayers) {
      lastEntry.pmPlayers.forEach(idx => {
        if (updatedGame.players[idx]) {
          updatedGame.players[idx].stats['plusMinus'] = (updatedGame.players[idx].stats['plusMinus'] || 0) - lastEntry.pmDelta;
        }
      });
    }
    if (lastEntry.rotKey && lastEntry.rotDeltas) {
      const updRots = [...rotationsRef.current];
      const ri = updRots.findIndex(r => r.key === lastEntry.rotKey);
      if (ri !== -1) {
        const d = lastEntry.rotDeltas;
        const rot = { ...updRots[ri], plusMinus: updRots[ri].plusMinus - d.rPm, rebDiff: updRots[ri].rebDiff - d.rReb, toDiff: updRots[ri].toDiff - d.rTo, teamFGMade: updRots[ri].teamFGMade - d.rTFGM, teamFGAtt: updRots[ri].teamFGAtt - d.rTFGA, oppFGMade: updRots[ri].oppFGMade - d.rOFGM, oppFGAtt: updRots[ri].oppFGAtt - d.rOFGA };
        if (lastEntry.rotTriggeredCount) { rot.count = Math.max(0, rot.count - 1); currentRotationHasStatRef.current = false; }
        updRots[ri] = rot;
        rotationsRef.current = updRots;
        setRotations(updRots);
      }
    }
    if (!isOpponent && (lastEntry.statType.includes('2pt') || lastEntry.statType.includes('3pt'))) {
      if (player.shotChart && player.shotChart.length > 0) player.shotChart.pop();
    }
    if (!isOpponent && lastEntry.statType === 'Stl' && updatedGame.opponent.stats['LiveTO'] > 0) {
      updatedGame.opponent.stats['LiveTO']--;
      if (updatedGame.opponent.periodStats[logPeriod]) updatedGame.opponent.periodStats[logPeriod]['LiveTO'] = Math.max(0, (updatedGame.opponent.periodStats[logPeriod]['LiveTO'] || 0) - 1);
    }
    if (!isOpponent && lastEntry.statType === 'LiveTO' && updatedGame.opponent.stats['Stl'] > 0) {
      updatedGame.opponent.stats['Stl']--;
      if (updatedGame.opponent.periodStats[logPeriod]) updatedGame.opponent.periodStats[logPeriod]['Stl'] = Math.max(0, (updatedGame.opponent.periodStats[logPeriod]['Stl'] || 0) - 1);
    }

    let newLog = gameLog.slice(1);
    // Also undo auto offensive rebound if present
    if (newLog.length > 0 && newLog[0].auto && newLog[0].statType === 'OffReb') {
      const autoEntry = newLog[0];
      const autoPlayer = autoEntry.playerIndex === 'opponent' ? updatedGame.opponent : updatedGame.players[autoEntry.playerIndex];
      if (autoPlayer.stats['OffReb'] > 0) autoPlayer.stats['OffReb']--;
      if (autoPlayer.periodStats[autoEntry.period] && autoPlayer.periodStats[autoEntry.period]['OffReb'] > 0) {
        autoPlayer.periodStats[autoEntry.period]['OffReb']--;
      }
      newLog = newLog.slice(1);
    }

    setGameLog(newLog);
    setCurrentGame(updatedGame);
    setLastStat(newLog.length > 0 ? { text: newLog[0].text } : null);
  };

  const deleteStatAtIndex = (index) => {
    if (index < 0 || index >= gameLog.length) return;
    const entry = gameLog[index];

    if (entry.statType === 'endPeriod') {
      const newLog = [...gameLog];
      newLog.splice(index, 1);
      setGameLog(newLog);
      return;
    }

    const updatedGame = { ...currentGame };
    const isOpponent = entry.playerIndex === 'opponent';
    const player = isOpponent ? updatedGame.opponent : updatedGame.players[entry.playerIndex];

    if (player && player.stats[entry.statType] > 0) player.stats[entry.statType]--;
    const logPeriod = entry.period;
    if (player && player.periodStats[logPeriod] && player.periodStats[logPeriod][entry.statType] > 0) {
      player.periodStats[logPeriod][entry.statType]--;
    }
    if (entry.pmDelta && entry.pmPlayers) {
      entry.pmPlayers.forEach(idx => {
        if (updatedGame.players[idx]) {
          updatedGame.players[idx].stats['plusMinus'] = (updatedGame.players[idx].stats['plusMinus'] || 0) - entry.pmDelta;
        }
      });
    }
    if (entry.rotKey && entry.rotDeltas) {
      const updRots = [...rotationsRef.current];
      const ri = updRots.findIndex(r => r.key === entry.rotKey);
      if (ri !== -1) {
        const d = entry.rotDeltas;
        let rot = { ...updRots[ri], plusMinus: updRots[ri].plusMinus - d.rPm, rebDiff: updRots[ri].rebDiff - d.rReb, toDiff: updRots[ri].toDiff - d.rTo, teamFGMade: updRots[ri].teamFGMade - d.rTFGM, teamFGAtt: updRots[ri].teamFGAtt - d.rTFGA, oppFGMade: updRots[ri].oppFGMade - d.rOFGM, oppFGAtt: updRots[ri].oppFGAtt - d.rOFGA };
        if (entry.rotTriggeredCount) rot = { ...rot, count: Math.max(0, rot.count - 1) };
        updRots[ri] = rot;
        rotationsRef.current = updRots;
        setRotations(updRots);
      }
    }

    // Handle related stats
    if (!isOpponent && entry.statType === 'Stl' && updatedGame.opponent.stats['LiveTO'] > 0) {
      updatedGame.opponent.stats['LiveTO']--;
      if (updatedGame.opponent.periodStats[logPeriod]) {
        updatedGame.opponent.periodStats[logPeriod]['LiveTO'] = Math.max(0, (updatedGame.opponent.periodStats[logPeriod]['LiveTO'] || 0) - 1);
      }
    }
    if (!isOpponent && entry.statType === 'LiveTO' && updatedGame.opponent.stats['Stl'] > 0) {
      updatedGame.opponent.stats['Stl']--;
      if (updatedGame.opponent.periodStats[logPeriod]) {
        updatedGame.opponent.periodStats[logPeriod]['Stl'] = Math.max(0, (updatedGame.opponent.periodStats[logPeriod]['Stl'] || 0) - 1);
      }
    }

    const newLog = [...gameLog];
    newLog.splice(index, 1);
    setGameLog(newLog);
    setCurrentGame(updatedGame);
  };

  const insertStatAtIndex = (index, position, playerIndex, statType, period) => {
    const updatedGame = { ...currentGame };
    const isOpponent = playerIndex === 'opponent';
    const player = isOpponent ? updatedGame.opponent : updatedGame.players[playerIndex];

    player.stats[statType] = (player.stats[statType] || 0) + 1;
    if (!player.periodStats[period]) player.periodStats[period] = {};
    player.periodStats[period][statType] = (player.periodStats[period][statType] || 0) + 1;
    if (period > updatedGame.maxPeriod) updatedGame.maxPeriod = period;

    const statLabel = { '2ptMade': '2PT Made', '2ptMiss': '2PT Miss', '3ptMade': '3PT Made', '3ptMiss': '3PT Miss', 'FTMade': 'FT Made', 'FTMiss': 'FT Miss', 'OffReb': 'Off Reb', 'DefReb': 'Def Reb', 'Ast': 'Assist', 'Stl': 'Steal', 'Blk': 'Block', 'LiveTO': 'Live TO', 'DeadTO': 'Dead TO', 'Foul': 'Foul', 'ForceJB': 'Force JB', 'ConcedeJB': 'Concede JB', 'endPeriod': 'End Period' };
    const playerName = isOpponent ? 'Opponent' : `#${player.number} ${player.name}`;

    let displayText = '';
    if (statType === 'endPeriod') {
      displayText = `End Period ${period}`;
    } else {
      displayText = `${playerName} - ${statLabel[statType]} (${player.stats[statType]})`;
    }

    const newEntry = { time: Date.now(), period, playerIndex, statType, text: displayText };
    const newLog = [...gameLog];
    const insertIdx = position === 'above' ? index : index + 1;
    newLog.splice(insertIdx, 0, newEntry);

    // Handle related stats
    if (!isOpponent && statType === 'Stl') {
      updatedGame.opponent.stats['LiveTO'] = (updatedGame.opponent.stats['LiveTO'] || 0) + 1;
      if (!updatedGame.opponent.periodStats[period]) updatedGame.opponent.periodStats[period] = {};
      updatedGame.opponent.periodStats[period]['LiveTO'] = (updatedGame.opponent.periodStats[period]['LiveTO'] || 0) + 1;
    }
    if (!isOpponent && statType === 'LiveTO') {
      updatedGame.opponent.stats['Stl'] = (updatedGame.opponent.stats['Stl'] || 0) + 1;
      if (!updatedGame.opponent.periodStats[period]) updatedGame.opponent.periodStats[period] = {};
      updatedGame.opponent.periodStats[period]['Stl'] = (updatedGame.opponent.periodStats[period]['Stl'] || 0) + 1;
    }

    // Update rotation data for the current lineup
    const rotKey = currentRotationKeyRef.current;
    if (rotKey && statType !== 'endPeriod') {
      let rPm = 0, rReb = 0, rTo = 0, rTFGM = 0, rTFGA = 0, rOFGM = 0, rOFGA = 0;
      if (statType === '2ptMade') rPm = isOpponent ? -2 : 2;
      else if (statType === '3ptMade') rPm = isOpponent ? -3 : 3;
      else if (statType === 'FTMade') rPm = isOpponent ? -1 : 1;
      if (!isOpponent) {
        if (statType === '2ptMade' || statType === '3ptMade') { rTFGM = 1; rTFGA = 1; }
        else if (statType === '2ptMiss' || statType === '3ptMiss') { rTFGA = 1; }
        else if (statType === 'OffReb' || statType === 'DefReb') { rReb = 1; }
        else if (statType === 'LiveTO' || statType === 'DeadTO') { rTo = -1; }
      } else {
        if (statType === '2ptMade' || statType === '3ptMade') { rOFGM = 1; rOFGA = 1; }
        else if (statType === '2ptMiss' || statType === '3ptMiss') { rOFGA = 1; }
        else if (statType === 'OffReb' || statType === 'DefReb') { rReb = -1; }
        else if (statType === 'LiveTO' || statType === 'DeadTO') { rTo = 1; }
      }
      const hasAnyDelta = rPm !== 0 || rReb !== 0 || rTo !== 0 || rTFGM !== 0 || rTFGA !== 0 || rOFGM !== 0 || rOFGA !== 0;
      if (hasAnyDelta) {
        const updRots = [...rotationsRef.current];
        let ri = updRots.findIndex(r => r.key === rotKey);
        if (ri === -1) {
          updRots.push({ key: rotKey, players: rotKey.split(',').map(Number), count: 0, plusMinus: 0, rebDiff: 0, toDiff: 0, teamFGMade: 0, teamFGAtt: 0, oppFGMade: 0, oppFGAtt: 0, offPoss: 0, defPoss: 0, offPoints: 0, defPoints: 0 });
          ri = updRots.length - 1;
        }
        updRots[ri] = { ...updRots[ri], plusMinus: updRots[ri].plusMinus + rPm, rebDiff: updRots[ri].rebDiff + rReb, toDiff: updRots[ri].toDiff + rTo, teamFGMade: updRots[ri].teamFGMade + rTFGM, teamFGAtt: updRots[ri].teamFGAtt + rTFGA, oppFGMade: updRots[ri].oppFGMade + rOFGM, oppFGAtt: updRots[ri].oppFGAtt + rOFGA };
        rotationsRef.current = updRots;
        setRotations(updRots);
      }
    }

    setGameLog(newLog);
    setCurrentGame(updatedGame);
    setFocusedStatIndex(insertIdx);
    setInsertStatMode(null);
  };

  const insertEndPeriodAtIndex = (index, position, period) => {
    const displayText = `End Period ${period}`;
    const newEntry = { time: Date.now(), period, playerIndex: null, statType: 'endPeriod', text: displayText };
    const newLog = [...gameLog];
    const insertIdx = position === 'above' ? index : index + 1;
    newLog.splice(insertIdx, 0, newEntry);

    const updatedGame = { ...currentGame };
    if (period > updatedGame.maxPeriod) updatedGame.maxPeriod = period;

    setGameLog(newLog);
    setCurrentGame(updatedGame);
    setFocusedStatIndex(insertIdx);
    setInsertStatMode(null);
  };

  const endPeriod = () => {
    if (currentPeriod < 8) {
      const updatedGame = { ...currentGame };
      commitPossession(updatedGame);
      pendingPossRef.current = null;
      const nextPossTeam = possTeamRef.current === 'us' ? 'them' : 'us';
      startPossession(nextPossTeam);
      setCurrentGame(updatedGame);
      const endPeriodText = `End Period ${currentPeriod}`;
      setGameLog([{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'endPeriod', text: endPeriodText }, ...gameLog]);
      setLastStat({ text: endPeriodText });
      setCurrentPeriod(currentPeriod + 1);
      const lineupSelections = {};
      currentGame.players.forEach((_, idx) => {
        lineupSelections[idx] = onCourtSetRef.current.has(idx);
      });
      setLineupConfirmModal({ selections: lineupSelections, isPeriodTransition: true, prevOnCourt: new Set(onCourtSetRef.current), title: `Start Q${currentPeriod + 1} Lineup` });
    }
  };

  const changePossession = () => {
    const updatedGame = { ...currentGame };
    commitPossession(updatedGame);
    pendingPossRef.current = null;
    const newTeam = possTeamRef.current === 'us' ? 'them' : 'us';
    startPossession(newTeam);
    setCurrentGame(updatedGame);
    const possText = `Poss Change → ${newTeam === 'us' ? updatedGame.teamName : (updatedGame.opponentName || 'Opponent')}`;
    setGameLog(prev => [{ time: Date.now(), period: currentPeriod, playerIndex: null, statType: 'possChange', text: possText }, ...prev]);
    setLastStat({ text: possText });
  };

  const endGame = async () => {
    const updatedGame = { ...currentGame };
    commitPossession(updatedGame);
    pendingPossRef.current = null;
    const gameToSave = { ...updatedGame, rotations: rotationsRef.current, gameLog };
    await saveGame(gameToSave);
    setCurrentGame(gameToSave);
    if (!games.some(g => g.id === gameToSave.id)) {
      setGames([...games, gameToSave]);
    } else {
      setGames(games.map(g => g.id === gameToSave.id ? gameToSave : g));
    }
    setIsEndGameView(true);
    setBoxScoreBackScreen('home');
    setFilterPeriod('Total');
    setScreen('boxScore');
  };

  const exportAllGames = async () => {
    try {
      const result = await storage.list('game:');
      if (!result || !result.keys || result.keys.length === 0) {
        alert('No games to export.');
        return;
      }
      const allGames = await Promise.all(result.keys.map(async k => {
        const d = await storage.get(k);
        return d ? JSON.parse(d.value) : null;
      }));
      const valid = allGames.filter(g => g !== null);
      const blob = new Blob([JSON.stringify(valid, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.download = `basketball_games_${new Date().toISOString().split('T')[0]}.json`;
      link.href = URL.createObjectURL(blob);
      link.click();
    } catch (e) { alert('Export failed: ' + e.message); }
  };

  const importGamesFromFile = async (file) => {
    try {
      const text = await file.text();
      const imported = JSON.parse(text);
      if (!Array.isArray(imported)) { alert('Invalid file format.'); return; }
      let added = 0, skipped = 0;
      for (const game of imported) {
        if (!game || !game.id) { skipped++; continue; }
        const existing = await storage.get(`game:${game.id}`);
        if (existing) { skipped++; continue; }
        await storage.set(`game:${game.id}`, JSON.stringify(game));
        setGames(prev => [...prev, game]);
        added++;
      }
      alert(`Import complete: ${added} game(s) added, ${skipped} skipped (already exist or invalid).`);
    } catch (e) { alert('Import failed: ' + e.message); }
  };

  const viewGame = (game) => {
    setCurrentGame(game);
    setFilterPeriod('Total');
    setIsEndGameView(true);
    setRotations(game.rotations || []);
    setGameLog(game.gameLog || []);
    setBoxScoreBackScreen('viewGames');
    setScreen('boxScore');
  };

  const resumeGame = (game) => {
    setCurrentGame(game);
    setCurrentPeriod(game.maxPeriod || 1);
    setGameLog([]);
    setLastStat(null);
    setIsEndGameView(false);
    setPlayerOrder(game.players.map((_, idx) => idx));
    const initialOnCourt = new Set(game.players.slice(0, Math.min(5, game.players.length)).map((_, idx) => idx));
    setOnCourtSet(initialOnCourt);
    rotationsRef.current = game.rotations || [];
    setRotations(game.rotations || []);
    const resumeRotKey = [...initialOnCourt].sort((a, b) => a - b).join(',');
    currentRotationKeyRef.current = resumeRotKey;
    currentRotationHasStatRef.current = false;
    onCourtSetRef.current = initialOnCourt;
    possTeamRef.current = 'us';
    setPossTeam('us');
    possStartRotKeyRef.current = resumeRotKey;
    possStartPlayersRef.current = new Set(initialOnCourt);
    pendingPossRef.current = null;
    currentPossPointsRef.current = 0;
    jumpBallArrowRef.current = null;
    offRebPossessionRef.current = null;
    setScreen('game');
  };

  const viewGameRotations = (game) => {
    setCurrentGame(game);
    setRotations(game.rotations || []);
    setRotationsBackScreen('viewGame');
    setScreen('rotations');
  };

  const theme = {

    card: darkMode ? 'bg-gray-800' : 'bg-white',
    text: darkMode ? 'text-white' : 'text-gray-900',

  if (screen === 'setup') return <GameSetup onStart={startNewGame} onBack={() => setScreen('home')} games={games} darkMode={darkMode} theme={theme} />;

      <div className={`min-h-screen ${theme.bg} ${theme.text} p-2 sm:p-4 max-w-6xl mx-auto`}>

            <button onClick={() => { setGameLogBackScreen('game'); setFocusedStatIndex(null); setScreen('gameLog'); }} className="flex-shrink-0 bg-purple-600 text-white px-2 py-1 rounded hover:bg-purple-700 text-xs whitespace-nowrap">Game Log</button>
